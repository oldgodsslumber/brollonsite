<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Film Kit</title>
<style>
/* ── RESET & CSS VARIABLES ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0f1117;
  --surf:     #1a1d27;
  --surf2:    #252930;
  --surf3:    #2d3240;
  --accent:   #0047BB;
  --accent-h: #0057e0;
  --success:  #22c55e;
  --warn:     #f59e0b;
  --danger:   #ef4444;
  --text:     #f1f5f9;
  --muted:    #94a3b8;
  --border:   #2d3748;
  --radius:   12px;
  --radius-sm:8px;
  --max-w:    600px;
  --hdr:      56px;
}

html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
#app-header {
  position: sticky;
  top: 0;
  z-index: 50;
  height: var(--hdr);
  background: rgba(15,17,23,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
}
.hdr-inner {
  display: flex;
  align-items: center;
  width: 100%;
  max-width: var(--max-w);
  margin: 0 auto;
  gap: 4px;
}
.hdr-title {
  flex: 1;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.hdr-title .blue { color: var(--accent); }
.hdr-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 18px;
  min-width: 40px;
  min-height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  transition: color .15s, background .15s;
  flex-shrink: 0;
}
.hdr-btn:hover { color: var(--text); background: var(--surf2); }

/* ── PAGE WRAP ── */
.page-wrap {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 24px 16px calc(40px + env(safe-area-inset-bottom));
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: background .15s, opacity .15s, transform .1s;
  min-height: 44px;
  text-decoration: none;
  color: inherit;
  font-family: inherit;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-h); }
.btn-ghost { background: var(--surf2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surf3); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { padding: 8px 14px; font-size: 13px; min-height: 36px; }
.btn-full { width: 100%; }
.btn-large { width: 100%; font-size: 16px; padding: 16px; }
.form-row { display: flex; gap: 10px; flex-wrap: wrap; }

/* ── FORMS ── */
.form-group { margin-bottom: 22px; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 8px;
}
input[type=text],
input[type=password],
textarea {
  width: 100%;
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 12px 14px;
  font-size: 15px;
  font-family: inherit;
  transition: border-color .15s;
  -webkit-appearance: none;
}
input[type=text]:focus,
input[type=password]:focus,
textarea:focus { outline: none; border-color: var(--accent); }
.form-hint { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; }

/* Sliders */
input[type=range] {
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  border-radius: 3px;
  background: var(--surf3);
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: 3px solid var(--bg);
  box-shadow: 0 0 0 2px var(--accent);
}
input[type=range]::-moz-range-thumb {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: 3px solid var(--bg);
}
.slider-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
  margin-top: 5px;
}
.skill-tip {
  margin-top: 10px;
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
  min-height: 20px;
}

/* Contenteditable styled as input */
.ce-input {
  display: block;
  width: 100%;
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 12px 14px;
  font-size: 15px;
  font-family: inherit;
  min-height: 44px;
  word-break: break-word;
  transition: border-color .15s;
}
.ce-input:focus { outline: none; border-color: var(--accent); }
.ce-input:empty::before { content: attr(data-placeholder); color: var(--muted); }

/* ── HOME SCREEN ── */
.empty-state {
  text-align: center;
  padding: 60px 16px 40px;
}
.empty-icon { font-size: 64px; margin-bottom: 16px; }
.empty-state h2 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
.empty-state p { color: var(--muted); font-size: 15px; line-height: 1.5; }

.section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 12px;
}
.project-list { margin-bottom: 8px; }
.project-card {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
}
.project-card-main {
  display: flex;
  align-items: center;
  padding: 16px;
  cursor: pointer;
  gap: 12px;
  transition: background .15s;
}
.project-card-main:hover { background: var(--surf2); }
.project-card-info { flex: 1; min-width: 0; }
.project-name { font-weight: 700; font-size: 16px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.project-meta { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.mini-progress-track { height: 4px; background: var(--surf3); border-radius: 2px; overflow: hidden; }
.mini-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s; }
.project-pct { font-size: 12px; color: var(--muted); margin-top: 4px; }
.project-arrow { color: var(--muted); font-size: 20px; flex-shrink: 0; }
.project-card-actions {
  display: flex;
  border-top: 1px solid var(--border);
}
.proj-action-btn {
  background: none;
  border: none;
  border-right: 1px solid var(--border);
  cursor: pointer;
  color: var(--muted);
  font-size: 15px;
  padding: 10px 16px;
  flex: 1;
  transition: color .15s, background .15s;
  font-family: inherit;
}
.proj-action-btn:last-child { border-right: none; }
.proj-action-btn:hover { color: var(--text); background: var(--surf2); }
.proj-action-btn.del:hover { color: var(--danger); }
.delete-confirm {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  color: var(--muted);
  flex-wrap: wrap;
}
.home-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 20px;
}

/* ── SETTINGS SCREEN ── */
.screen-title { font-size: 24px; font-weight: 800; margin-bottom: 24px; letter-spacing: -0.03em; }
.api-key-link {
  display: block;
  text-align: center;
  margin-top: 16px;
  color: var(--accent);
  font-size: 14px;
  text-decoration: none;
}
.api-key-link:hover { text-decoration: underline; }

/* ── NEW PROJECT SCREEN ── */
.lens-badge-wrap { margin-bottom: 20px; min-height: 28px; }
.lens-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  background: rgba(0,71,187,0.12);
  color: var(--accent);
  border: 1px solid rgba(0,71,187,0.3);
  border-radius: 20px;
  padding: 5px 12px;
}

/* ── LOADING SCREEN ── */
.loading-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  text-align: center;
  padding: 40px 20px;
  gap: 0;
}
.loading-spinner {
  width: 48px; height: 48px;
  border: 4px solid var(--surf3);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin-bottom: 24px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 8px;
}
.loading-sub { font-size: 13px; color: var(--muted); }

/* ── CHECKLIST SCREEN ── */
.checklist-hdr { margin-bottom: 16px; }
.proj-title-edit {
  font-size: 22px;
  font-weight: 800;
  display: block;
  letter-spacing: -0.03em;
  border-bottom: 1px dashed transparent;
  padding-bottom: 2px;
  transition: border-color .15s;
  cursor: text;
  margin-bottom: 6px;
  word-break: break-word;
}
.proj-title-edit:focus { outline: none; border-bottom-color: var(--accent); }
.progress-label { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
.progress-track { height: 6px; background: var(--surf3); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .4s ease; }

.tip-banner {
  background: rgba(0,71,187,0.1);
  border: 1px solid rgba(0,71,187,0.25);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 16px;
}

/* Shot cards */
.shot-list { margin-bottom: 16px; }
.shot-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surf);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  min-height: 58px;
  transition: border-color .2s, background .2s, transform .1s;
}
.shot-card:active { transform: scale(0.99); }
.shot-card.done {
  border-color: var(--success);
  background: rgba(34,197,94,0.06);
}
.check-circle {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  color: var(--success);
  flex-shrink: 0;
  transition: border-color .2s, background .2s;
}
.shot-card.done .check-circle { background: var(--success); border-color: var(--success); color: #fff; }
.shot-info { flex: 1; min-width: 0; }
.shot-type-badge {
  font-size: 11px; font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 2px;
  display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
}
.shot-title { font-size: 14px; font-weight: 600; line-height: 1.3; }
.shot-card.done .shot-title { opacity: 0.5; text-decoration: line-through; }
.fps-badge-sm, .mimo-badge-sm {
  display: inline-block;
  font-size: 9px;
  background: var(--surf3);
  border-radius: 3px;
  padding: 1px 5px;
  color: var(--muted);
  font-weight: 700;
  letter-spacing: 0;
}
.shot-expand {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 18px;
  min-width: 36px; min-height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px; flex-shrink: 0;
  transition: color .15s, background .15s;
}
.shot-expand:hover { color: var(--text); background: var(--surf2); }

/* Custom shot form */
.custom-form-wrap { margin-bottom: 16px; }
.add-custom-btn { width: 100%; border-style: dashed !important; }
.custom-form {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.custom-form-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }

/* New direction panel */
.new-dir-wrap { margin-bottom: 16px; }
.new-dir-toggle { width: 100%; color: var(--muted); font-size: 14px; }
.new-dir-form {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.new-dir-form h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.new-dir-desc { font-size: 13px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }

/* Checklist footer */
.checklist-footer {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-top: 16px; padding-top: 16px;
  border-top: 1px solid var(--border);
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0);
  display: flex; align-items: flex-end;
  z-index: 100;
  transition: background .3s;
}
.modal-overlay.open { background: rgba(0,0,0,0.75); }
.modal-sheet {
  background: var(--surf);
  border-radius: 20px 20px 0 0;
  padding: 16px 20px calc(28px + env(safe-area-inset-bottom));
  width: 100%;
  max-height: 92vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(0.32,0.72,0,1);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
@media (min-width: 640px) {
  .modal-overlay { align-items: center; }
  .modal-sheet {
    max-width: var(--max-w);
    margin: 0 auto;
    border-radius: var(--radius);
    max-height: 85vh;
    padding-bottom: 24px;
  }
}
.modal-drag { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.shot-what { font-size: 13px; color: var(--accent); font-weight: 600; margin-bottom: 8px; }
.modal-title { font-size: 20px; font-weight: 800; margin-bottom: 10px; line-height: 1.2; letter-spacing: -0.02em; }
.modal-badges { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.badge-type {
  font-size: 13px; font-weight: 700;
  background: rgba(0,71,187,0.15); color: var(--accent);
  border-radius: 20px; padding: 4px 12px;
}
.badge-fps {
  font-size: 12px; font-weight: 700;
  background: rgba(245,158,11,0.15); color: var(--warn);
  border-radius: 4px; padding: 3px 8px;
}
.badge-mimo {
  font-size: 12px; font-weight: 700;
  background: rgba(245,158,11,0.15); color: var(--warn);
  border-radius: 4px; padding: 3px 8px;
}
.modal-desc { font-size: 15px; line-height: 1.6; margin-bottom: 14px; }
.tip-box {
  background: rgba(0,71,187,0.12);
  border-left: 3px solid var(--accent);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 12px 16px;
  font-size: 14px; line-height: 1.6;
  margin-bottom: 14px;
  position: relative;
}
.tip-box::before {
  content: ''; position: absolute; left: -3px; top: 0; bottom: 0; width: 3px;
  background: var(--accent); border-radius: 2px 0 0 2px;
  box-shadow: 0 0 8px rgba(0,71,187,0.7);
}
.why-box {
  background: rgba(245,158,11,0.08);
  border-left: 3px solid rgba(245,158,11,0.6);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 12px 16px;
  font-size: 13px; color: var(--text); line-height: 1.6;
  margin-bottom: 14px;
}
.why-box strong { color: #fbbf24; }
.modal-meta { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
.mimo-link {
  display: block; text-align: center;
  padding: 12px;
  background: rgba(245,158,11,0.08);
  border: 1px solid rgba(245,158,11,0.3);
  border-radius: var(--radius-sm);
  color: var(--warn); text-decoration: none;
  font-weight: 600; font-size: 14px;
  margin-bottom: 14px;
}

/* ── SHOT ANIMATIONS ── */
.anim-frame {
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #07090f;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  margin-bottom: 14px;
  border: 1px solid var(--border);
}
.anim-label {
  position: absolute;
  bottom: 8px; left: 50%;
  transform: translateX(-50%);
  font-size: 10px; font-weight: 700;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  white-space: nowrap;
  pointer-events: none;
}
.anim-root {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px;
  position: relative;
}

/* Static */
.anim-vf {
  width: 80px; height: 56px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.vf-c {
  position: absolute;
  width: 14px; height: 14px;
  border-color: rgba(0,71,187,0.7);
  border-style: solid;
}
.vf-tl { top:0; left:0; border-width: 3px 0 0 3px; }
.vf-tr { top:0; right:0; border-width: 3px 3px 0 0; }
.vf-bl { bottom:0; left:0; border-width: 0 0 3px 3px; }
.vf-br { bottom:0; right:0; border-width: 0 3px 3px 0; }
.anim-lock { font-size: 26px; animation: lock-pulse 2.5s ease-in-out infinite; }
@keyframes lock-pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

/* Pan */
.pan-scene {
  width: 80%; height: 44%;
  position: relative;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
}
.pan-sub {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  width: 18px; height: 28px;
  background: rgba(0,71,187,0.7);
  border-radius: 3px;
  animation: pan-sub-move 3s ease-in-out infinite alternate;
}
@keyframes pan-sub-move { from { left: 8%; } to { left: 66%; } }
.pan-arrow {
  font-size: 26px; color: var(--accent);
  animation: pan-arr-move 3s ease-in-out infinite alternate;
}
@keyframes pan-arr-move { from { transform: translateX(-18px); } to { transform: translateX(18px); } }

/* Tilt */
.tilt-scene {
  width: 44%; height: 60%;
  position: relative;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
}
.tilt-sub {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  width: 28px; height: 10px;
  background: rgba(0,71,187,0.7);
  border-radius: 3px;
  animation: tilt-sub-move 3s ease-in-out infinite alternate;
}
@keyframes tilt-sub-move { from { top: 10%; } to { top: 68%; } }
.tilt-arrow {
  font-size: 26px; color: var(--accent);
  animation: tilt-arr-move 3s ease-in-out infinite alternate;
}
@keyframes tilt-arr-move { from { transform: translateY(-14px); } to { transform: translateY(14px); } }

/* Tracking */
.track-sub {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  width: 16px; height: 28px;
  background: var(--accent);
  border-radius: 3px;
  animation: track-sub-move 3s ease-in-out infinite alternate;
}
@keyframes track-sub-move { from { left: 15%; } to { left: 62%; } }
.track-frame {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  width: 38px; height: 50px;
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 4px;
  animation: track-frame-move 3s ease-in-out infinite alternate;
  animation-delay: 0.25s;
}
@keyframes track-frame-move { from { left: 12%; } to { left: 59%; } }

/* Slow-mo */
.sm-bars {
  display: flex; gap: 7px; align-items: center;
  margin-bottom: 4px;
}
.sm-bar {
  width: 5px; height: 36px;
  background: rgba(0,71,187,0.5);
  border-radius: 3px;
  animation: sm-bar-anim 1.6s ease-in-out infinite;
}
.sm-bar:nth-child(2) { animation-delay: .2s; height: 54px; }
.sm-bar:nth-child(3) { animation-delay: .4s; }
@keyframes sm-bar-anim {
  0%,100% { transform: scaleX(1); opacity: 0.5; filter: blur(0); }
  50%      { transform: scaleX(3); opacity: 1;   filter: blur(1.5px); }
}
.fps-display { font-size: 22px; font-weight: 800; color: var(--warn); letter-spacing: 0.04em; }

/* Hyperlapse */
.hl-ring {
  position: absolute;
  width: 50px; height: 50px;
  border: 2px solid rgba(0,71,187,0.7);
  border-radius: 50%;
  animation: hl-ring-expand 2.4s ease-out infinite;
}
.hl-r2 { animation-delay: .8s; }
.hl-r3 { animation-delay: 1.6s; }
@keyframes hl-ring-expand {
  0%   { transform: scale(0.15); opacity: 1; }
  100% { transform: scale(4);    opacity: 0; }
}
.hl-center { font-size: 22px; font-weight: 800; color: var(--accent); position: relative; z-index: 2; }

/* Timelapse */
.tl-clock { width: 64px; height: 64px; }
.tl-hand { transform-origin: 30px 30px; animation: tl-rotate 1.8s linear infinite; }
@keyframes tl-rotate { to { transform: rotate(360deg); } }
.tl-sun {
  position: absolute;
  top: 10px; right: 18px;
  font-size: 22px;
  animation: tl-sun-bob 3s ease-in-out infinite;
}
@keyframes tl-sun-bob { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-8px); } }

/* Zoom */
.zoom-outer {
  width: 78px; height: 54px;
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
}
.zoom-inner {
  border: 2px solid var(--accent);
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  animation: zoom-pulse 2.2s ease-in-out infinite;
}
@keyframes zoom-pulse {
  0%,100% { width: 28px; height: 20px; }
  50%      { width: 60px; height: 42px; }
}
.zoom-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }

/* Custom */
.custom-pencil { font-size: 48px; animation: pencil-rock 1.6s ease-in-out infinite; transform-origin: center bottom; }
@keyframes pencil-rock { 0%,100%{ transform: rotate(-6deg); } 50%{ transform: rotate(6deg); } }

/* Mimo overlay badge (inside anim-frame) */
.mimo-overlay {
  position: absolute;
  bottom: 8px; right: 8px;
  font-size: 10px; font-weight: 700;
  background: var(--warn); color: #000;
  border-radius: 4px; padding: 2px 7px;
  z-index: 3;
}

/* ── SECTION HEADERS IN CHECKLIST ── */
.shot-section {
  margin-bottom: 6px;
}
.shot-section-hdr {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 4px 6px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.shot-section-hdr-title {
  flex: 1;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  cursor: text;
  min-width: 0;
}
.shot-section-hdr-title:focus { outline: none; color: var(--text); }
.section-shot-count {
  font-size: 11px;
  color: var(--surf3);
  background: var(--surf2);
  border-radius: 10px;
  padding: 1px 7px;
  font-weight: 700;
  flex-shrink: 0;
}
.add-section-btn {
  width: 100%;
  border-style: dashed !important;
  margin-top: 8px;
  color: var(--muted);
  font-size: 13px;
}
.add-section-form {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-top: 8px;
}

/* ── SORT BUTTONS (builder screen only) ── */
.sort-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--surf3);
  font-size: 13px;
  min-width: 26px;
  min-height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  padding: 0;
  flex-shrink: 0;
  transition: color .15s, background .15s;
}
.sort-btn:hover { color: var(--muted); background: var(--surf2); }
.sort-btns { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }

/* ── DRAG HANDLES (checklist reorder mode) ── */
.drag-handle {
  cursor: grab;
  color: var(--muted);
  font-size: 22px;
  min-width: 36px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  opacity: 0.6;
  transition: opacity .15s;
}
.drag-handle:hover, .drag-handle:active { opacity: 1; cursor: grabbing; }
.shot-card.dragging { opacity: 0.22; }
.shot-card.drag-over-before { border-top: 3px solid var(--accent) !important; }
.shot-card.drag-over-after  { border-bottom: 3px solid var(--accent) !important; }
.shot-section.drag-over-section > .shot-section-hdr {
  background: rgba(0,71,187,0.12);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
}
.reorder-banner {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,71,187,0.1);
  border: 1px solid rgba(0,71,187,0.3);
  border-radius: var(--radius-sm);
  padding: 9px 14px;
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 12px;
}
.section-drag-handle {
  cursor: grab;
  color: var(--muted);
  font-size: 18px;
  min-width: 30px;
  min-height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  opacity: 0.5;
  transition: opacity .15s;
}
.section-drag-handle:hover { opacity: 1; }

/* ── TYPE HINT ── */
.type-hint {
  font-size: 12px;
  color: var(--accent);
  background: rgba(0,71,187,0.07);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  margin-top: 6px;
  line-height: 1.5;
  display: none;
}
.type-hint.visible { display: block; }

/* ── BUILDER SCREEN (spreadsheet-style) ── */
.builder-intro {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 12px;
}
.builder-tip-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,71,187,0.08);
  border: 1px solid rgba(0,71,187,0.25);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 16px;
  line-height: 1.6;
  flex-wrap: wrap;
}
.builder-tip-bar kbd {
  background: var(--surf2);
  border: 1px solid var(--border);
  border-bottom-width: 2px;
  border-radius: 4px;
  padding: 0 5px;
  font-size: 10px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  color: var(--text);
}
.builder-section {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color .15s, box-shadow .15s;
}
.builder-section.dragging { opacity: 0.4; }
.builder-section.section-drag-over {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0,71,187,0.25);
}
.builder-section-hdr {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surf2);
}
.builder-section-grip {
  cursor: grab;
  color: var(--muted);
  font-size: 14px;
  user-select: none;
  -webkit-user-select: none;
  padding: 4px 6px;
  border-radius: 4px;
  flex-shrink: 0;
  line-height: 1;
  letter-spacing: -2px;
}
.builder-section-grip:hover { color: var(--text); background: var(--surf3); }
.builder-section-grip:active { cursor: grabbing; }
.builder-section-name {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 4px;
  padding: 6px 8px;
  color: var(--text);
  min-width: 0;
  font-family: inherit;
}
.builder-section-name:hover { background: var(--surf3); }
.builder-section-name:focus { outline: none; background: var(--surf3); border-color: var(--accent); }
.builder-section-count {
  font-size: 11px;
  color: var(--muted);
  background: var(--surf3);
  border-radius: 10px;
  padding: 2px 8px;
  font-weight: 700;
  flex-shrink: 0;
}
.builder-section-del {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--surf3);
  font-size: 14px;
  padding: 4px 8px;
  border-radius: 4px;
  flex-shrink: 0;
  transition: color .15s, background .15s;
}
.builder-section-del:hover { color: var(--danger); background: rgba(239,68,68,0.1); }
.builder-section-body { padding: 6px; }
.builder-row {
  display: grid;
  grid-template-columns: 22px 138px 1fr 30px;
  align-items: center;
  gap: 6px;
  padding: 4px 6px;
  border-radius: 6px;
  border: 1px solid transparent;
  transition: background .12s, border-color .12s, box-shadow .12s;
  cursor: default;
}
.builder-row:hover { background: var(--surf2); }
.builder-row.selected {
  background: rgba(0,71,187,0.18);
  border-color: var(--accent);
}
.builder-row.dragging { opacity: 0.35; }
.builder-row.drag-over-before { box-shadow: inset 0 2px 0 var(--accent); }
.builder-row.drag-over-after  { box-shadow: inset 0 -2px 0 var(--accent); }
.builder-row-grip {
  cursor: grab;
  color: var(--surf3);
  font-size: 14px;
  text-align: center;
  user-select: none;
  -webkit-user-select: none;
  line-height: 1;
  padding: 4px 0;
  letter-spacing: -2px;
}
.builder-row:hover .builder-row-grip { color: var(--muted); }
.builder-row-grip:active { cursor: grabbing; }
.builder-row select,
.builder-row input[type=text] {
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 7px 10px;
  font-size: 13px;
  font-family: inherit;
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
}
.builder-row select {
  padding-right: 22px;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6' fill='none'><path d='M1 1l4 4 4-4' stroke='%2394a3b8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background-repeat: no-repeat;
  background-position: right 8px center;
}
.builder-row input[type=text]:focus,
.builder-row select:focus { outline: none; border-color: var(--accent); }
.builder-row.selected select,
.builder-row.selected input[type=text] { border-color: rgba(0,71,187,0.45); }
.builder-row-del {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--surf3);
  font-size: 13px;
  padding: 6px;
  border-radius: 4px;
  transition: color .15s, background .15s;
}
.builder-row-del:hover { color: var(--danger); background: rgba(239,68,68,0.1); }
.builder-row-empty {
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  padding: 12px 8px;
  font-style: italic;
}
.builder-add-row-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  background: transparent;
  border: 1px dashed var(--border);
  color: var(--muted);
  border-radius: 6px;
  padding: 8px;
  margin-top: 4px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: color .15s, background .15s, border-color .15s;
}
.builder-add-row-btn:hover { color: var(--text); background: var(--surf2); border-color: var(--accent); }
.builder-actions {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── BANNER TOAST ── */
#app-banner {
  display: none;
  position: fixed;
  top: calc(var(--hdr) + 8px);
  left: 50%; transform: translateX(-50%);
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600;
  z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  max-width: calc(100vw - 32px);
  text-align: center;
  pointer-events: none;
}
.ban-danger  { background: var(--danger);  color: #fff; }
.ban-success { background: var(--success); color: #fff; }
.ban-info    { background: var(--surf2);   color: var(--text); border: 1px solid var(--border); }
.ban-gold    { background: #92400e; color: #fde68a; }

/* ── B-ROLL SCHOOL ── */
.school-hero { text-align: center; padding: 20px 8px 4px; animation: fadeUp 0.3s ease both; }
.school-hero h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.school-hero p { color: var(--muted); font-size: 15px; line-height: 1.5; }
.section-label {
  font-size: 12px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .06em; margin: 20px 0 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::before {
  content: ''; display: inline-block; width: 3px; height: 12px;
  background: var(--accent); border-radius: 2px; flex-shrink: 0;
}
.lesson-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 4px;
}
.lesson-card {
  background: var(--surf); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 12px;
  cursor: pointer; transition: border-color .18s, transform .18s, box-shadow .18s, background .18s;
  display: flex; flex-direction: column; gap: 4px; position: relative;
  animation: fadeUp 0.3s ease both;
}
.lesson-card:nth-child(1) { animation-delay: 0.04s; }
.lesson-card:nth-child(2) { animation-delay: 0.08s; }
.lesson-card:nth-child(3) { animation-delay: 0.12s; }
.lesson-card:nth-child(4) { animation-delay: 0.16s; }
.lesson-card:nth-child(5) { animation-delay: 0.20s; }
.lesson-card:nth-child(6) { animation-delay: 0.24s; }
.lesson-card:nth-child(7) { animation-delay: 0.28s; }
.lesson-card:nth-child(8) { animation-delay: 0.32s; }
.lesson-card:hover  { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,71,187,0.18); border-color: rgba(0,71,187,0.5); }
.lesson-card:active { transform: scale(0.97) translateY(0); }
.lesson-card.read   { border-color: rgba(0,71,187,0.45); background: rgba(0,71,187,0.06); }
.lesson-icon { font-size: 26px; line-height: 1; margin-bottom: 4px; }
.lesson-title { font-size: 13px; font-weight: 700; line-height: 1.3; }
.lesson-subtitle { font-size: 11px; color: var(--muted); line-height: 1.3; }
.gyro-badge {
  position: absolute; top: 8px; right: 8px;
  font-size: 9px; font-weight: 700;
  background: rgba(0,71,187,0.2); color: #60a5fa;
  border-radius: 20px; padding: 2px 5px;
  border: 1px solid rgba(0,71,187,0.35);
}
.read-check { position: absolute; bottom: 7px; right: 9px; font-size: 13px; color: var(--success); }
.challenge-section, .starter-section { margin-top: 20px; }
.challenge-card, .starter-card {
  background: var(--surf); border: 1px solid var(--border);
  border-left: 3px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
  transition: transform .18s, box-shadow .18s, border-color .18s;
  animation: slideInLeft 0.32s ease both;
}
.challenge-card:nth-child(1) { animation-delay: 0.12s; }
.challenge-card:nth-child(2) { animation-delay: 0.19s; }
.challenge-card:nth-child(3) { animation-delay: 0.26s; }
.challenge-card:nth-child(4) { animation-delay: 0.33s; }
.challenge-card:nth-child(5) { animation-delay: 0.40s; }
.challenge-card:nth-child(6) { animation-delay: 0.47s; }
.challenge-card:nth-child(7) { animation-delay: 0.54s; }
.challenge-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); border-left-color: var(--accent); }
.challenge-card-header, .starter-card-header {
  display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px;
}
.challenge-icon, .starter-icon { font-size: 32px; line-height: 1; flex-shrink: 0; }
.challenge-title, .starter-title { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.challenge-tagline, .starter-desc { font-size: 13px; color: var(--muted); line-height: 1.4; }
.challenge-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
.skill-pill {
  font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
}
.skill-pill.beginner     { background: rgba(34,197,94,0.15);  color: #4ade80; }
.skill-pill.intermediate { background: rgba(245,158,11,0.15); color: #fbbf24; }
.skill-pill.advanced     { background: rgba(96,165,250,0.15); color: #60a5fa; }
.badge-preview-wrap { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.badge-preview-wrap svg { width: 28px; height: 28px; flex-shrink: 0; }
/* Lesson screen */
.lesson-anim-wrap {
  background: var(--surf); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 20px;
}
.lesson-blocks { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
.lesson-text, .tip-box, .why-box, .tip-banner, .lesson-bullets { animation: fadeUp 0.35s ease both; }
.lesson-text { font-size: 15px; line-height: 1.72; color: var(--text); }
.lesson-bullets { list-style: none; padding-left: 0; }
.lesson-bullets li { font-size: 14px; line-height: 1.65; margin-bottom: 6px; padding-left: 18px; position: relative; }
.lesson-bullets li::before { content: ''; position: absolute; left: 0; top: 8px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
/* Badge grid */
.badge-section { margin-top: 24px; margin-bottom: 16px; animation: fadeUp 0.35s ease both; animation-delay: 0.25s; }
.badge-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px 10px; }
.badge-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.badge-svg { width: 56px; height: 56px; color: var(--muted); transition: filter .3s, color .3s, opacity .3s; }
.badge-svg.earned   { color: var(--accent); animation: badgePulse 3s ease-in-out infinite; }
.badge-svg.locked   { opacity: 0.28; filter: grayscale(1); }
.badge-svg.bronze   { color: #cd7f32; filter: drop-shadow(0 0 6px rgba(205,127,50,0.6)); }
.badge-svg.silver   { color: #a8a9ad; filter: drop-shadow(0 0 6px rgba(168,169,173,0.6)); }
.badge-svg.gold     { color: #ffd700; animation: goldPulse 3s ease-in-out infinite; }
.badge-svg.platinum { color: #e8e8f0; filter: drop-shadow(0 0 8px rgba(232,232,240,0.8)); }
.badge-svg.seasonal { color: #06b6d4; filter: drop-shadow(0 0 8px rgba(6,182,212,0.7)); }
.badge-name { font-size: 10px; font-weight: 600; text-align: center; color: var(--muted); line-height: 1.2; }
.badge-name.earned-name { color: var(--text); }
/* Challenge tier section headers */
.shot-section[data-section="Foundation"] .shot-section-hdr    { border-left: 3px solid var(--success); padding-left: 10px; }
.shot-section[data-section="Level Up"] .shot-section-hdr      { border-left: 3px solid var(--warn);    padding-left: 10px; }
.shot-section[data-section="Go Further"] .shot-section-hdr    { border-left: 3px solid var(--accent);  padding-left: 10px; }
.shot-section[data-section="Your Shots"] .shot-section-hdr    { border-left: 3px solid #a855f7;        padding-left: 10px; }
.shot-section[data-section="Foundation"] .shot-section-hdr-title  { color: var(--success); }
.shot-section[data-section="Level Up"] .shot-section-hdr-title    { color: var(--warn); }
.shot-section[data-section="Go Further"] .shot-section-hdr-title  { color: #60a5fa; }
.shot-section[data-section="Your Shots"] .shot-section-hdr-title  { color: #c084fc; }

/* ── New video tabs ── */
.tab-group { display:flex; gap:0; margin-bottom:20px; border-radius:var(--radius-sm); overflow:hidden; border:1px solid var(--border); }
.tab-btn { flex:1; padding:12px 8px; background:var(--surf2); border:none; color:var(--muted); font-size:14px; font-weight:500; cursor:pointer; transition:background .15s,color .15s; text-align:center; line-height:1.3; }
.tab-btn.active { background:rgba(0,71,187,0.2); color:var(--text); font-weight:600; }
.tab-btn:hover:not(.active) { background:var(--surf3); color:var(--text); }

/* ── Camera field ── */
.camera-field-wrap { display:flex; gap:8px; align-items:center; }
.camera-field-wrap input { flex:1; }
.camera-detect-btn { flex-shrink:0; white-space:nowrap; padding:10px 12px; font-size:13px; }

/* ── Stretch pill ── */
.stretch-pill { display:inline-block; background:rgba(245,158,11,0.18); color:#f59e0b; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; border-radius:4px; padding:1px 5px; margin-left:5px; vertical-align:middle; }

/* ── Video type pill ── */
.type-pill { display:inline-block; background:rgba(255,255,255,0.07); color:var(--muted); font-size:10px; border-radius:4px; padding:1px 5px; margin-left:2px; vertical-align:middle; }

/* ── Type select (new project form) ── */
.type-select-pill { display:inline-flex; align-items:center; gap:8px; background:var(--surf2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:8px 12px; font-size:14px; color:var(--muted); cursor:default; }
.type-coming-soon { font-size:10px; background:rgba(0,71,187,0.18); color:var(--accent); border-radius:3px; padding:1px 6px; }

/* ── Segmented button group ── */
.seg-group { display:flex; flex-wrap:wrap; gap:6px; margin-top:2px; }
.seg-btn { flex:1; min-width:80px; padding:8px 10px; background:var(--surf2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--muted); font-size:13px; cursor:pointer; transition:background .15s,color .15s,border-color .15s; }
.seg-btn.active { background:rgba(0,71,187,0.2); border-color:var(--accent); color:var(--text); }
.seg-btn:hover:not(.active) { background:var(--surf3); color:var(--text); }

/* ── Script card ── */
.script-card { background:var(--surf); border:1px solid rgba(0,71,187,0.3); border-left:3px solid var(--accent); border-radius:var(--radius); padding:16px; margin:16px 0 8px; animation:fadeUp 0.4s ease both; }
.script-card-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.script-card-title { font-size:14px; font-weight:700; color:var(--text); }
.script-card-body { font-size:14px; line-height:1.7; color:var(--muted); }
.script-card-body p { margin-bottom:.75em; }
.script-card-body p:last-child { margin-bottom:0; }

/* ── Checklist type label ── */
.checklist-type-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-top:2px; margin-bottom:4px; }

/* ── Completion card ── */
.completion-card {
  background: linear-gradient(135deg, rgba(0,71,187,0.15), rgba(168,85,247,0.1));
  border: 1px solid rgba(0,71,187,0.35);
  border-radius: var(--radius);
  padding: 20px 16px;
  margin: 16px 0 8px;
  text-align: center;
  animation: fadeUp 0.4s ease both;
}
.completion-card-icon  { font-size: 36px; margin-bottom: 8px; }
.completion-card-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
.completion-card-body  { font-size: 14px; color: var(--muted); line-height: 1.6; }
.completion-card-body strong { color: var(--text); }

/* ── School animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-16px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes badgePulse {
  0%, 100% { filter: drop-shadow(0 0 7px rgba(0,71,187,0.55)); }
  50%       { filter: drop-shadow(0 0 16px rgba(0,71,187,0.9)); }
}
@keyframes goldPulse {
  0%, 100% { filter: drop-shadow(0 0 7px rgba(255,215,0,0.65)); }
  50%       { filter: drop-shadow(0 0 16px rgba(255,215,0,1)); }
}

        { id:'cl-1', type:'tilt',    section:'Foundation',  title:'Wide tilt up from entrance to sky',               completed:false, custom:false, fps:null, app:null, duration:'6-8s', tip:'Start at the pavement, end at the roofline. The hero opening shot.',                                             description:'Stand well back from the building entrance. Frame the pavement at the very bottom of your shot. Slowly, steadily tilt upward to reveal the full building facade.' },
        { id:'cl-2', type:'static',  section:'Foundation',  title:'Lock on elevator bank — doors cycling',           completed:false, custom:false, fps:null, app:null, duration:'8-10s',tip:'Completely still. Let doors open and close around a fixed frame.',                                              description:'Lock your camera on the elevator bank and hold completely still. Wait for doors to open, people to exit and enter, and doors to close. The geometric rhythm of this is genuinely cinematic.' },
        { id:'cl-3', type:'static',  section:'Foundation',  title:'Close static: signage or lobby art detail',       completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'6–8 inches. Portrait mode for subject isolation.',                                                              description:'Find a logo, wayfinding sign, or piece of lobby artwork. Get 6–8 inches away. Hold completely still. 4 to 5 seconds. These detail shots are the quiet punctuation marks of a great video.' },
        { id:'cl-4', type:'pan',     section:'Level Up',    title:'Pan across reception desk',                       completed:false, custom:false, fps:null, app:null, duration:'5-6s', tip:'Start right, sweep left. Include a person if you can.',                                                          description:'Stand 3–4 metres from reception. Start frame right of the desk and pan slowly left across its full length. If there\'s a receptionist, include them — people in frame tell a story.' },
        { id:'cl-5', type:'tilt',    section:'Level Up',    title:'Tilt floor to ceiling in the atrium',             completed:false, custom:false, fps:null, app:null, duration:'6-8s', tip:'The full vertical space. 6–8 seconds. Slow and committed.',                                                     description:'Find the most impressive vertical space in the lobby. Point at the floor pattern, then slowly tilt all the way up — revealing columns, signage, windows, and ceiling. Give yourself 6–8 full seconds.' },
        { id:'cl-6', type:'tracking',section:'Level Up',    title:'Revolving door tracking shot',                    completed:false, custom:false, fps:null, app:null, duration:'5-7s', tip:'Walk with the door from outside in. Bent knees.',                                                               description:'Stand to one side of the revolving door. As people push through, walk with them from outside to inside, keeping the door in frame. Bent knees — smooth movement.' },
        { id:'cl-7', type:'static',  section:'Go Further',  title:'Bird\'s eye from mezzanine: people flowing below',completed:false, custom:false, fps:null, app:null, duration:'6s',   tip:'Elevated + completely still. People as patterns.',                                                              description:'From a mezzanine or upper landing, hold your camera pointing straight down at people flowing through the lobby below. Completely still. 6 seconds. People become patterns from above.' },
        { id:'cl-8', type:'static',  section:'Go Further',  title:'Ground level: phone low pointing up staircase railing', completed:false, custom:false, fps:null, app:null, duration:'5s', tip:'Portrait mode. "The geometry of a staircase from the floor is pure architecture."',                          description:'Set your phone at floor level pointing up along the staircase railing. Portrait mode if available. The diagonal line of architecture from ground level is dramatic and unexpected.' },
        { id:'cl-9', type:'custom',  section:'Your Shots',  title:'Your Shot: What best communicates the scale of this space?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Scale is about contrast — a small figure against a tall ceiling. Locked static, any angle.',               description:'Every lobby has a moment of surprising scale — a height, a width, a depth. What communicates it most honestly? Think about the difference: wide static, bird\'s eye, low angle looking up. Which makes the space feel biggest?' },
        { id:'cl-10',type:'custom',  section:'Your Shots',  title:'Your Shot: What does the dominant material here say?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'3–4 inches. Cinema mode. The material becomes abstract and beautiful at close range.',                        description:'Marble, glass, brushed steel, carpet — materials communicate values and history. What does the dominant material in this lobby say about the organisation inside? Get close to the best surface and let the texture tell the story.' },
        { id:'cl-11',type:'static',  section:'Foundation',  title:'Static: lobby floor pattern',                     completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'Look down. The floor is often the most interesting thing in a lobby. 4–5 seconds.',                            description:'Look down at the lobby floor. Marble, tile, wood, carpet — lock your camera pointing straight down and hold for 4–5 seconds. Lobby floors often hold incredible pattern and material that nobody looks at.' },
        { id:'cl-12',type:'pan',     section:'Foundation',  title:'Pan along lobby seating area',                    completed:false, custom:false, fps:null, app:null, duration:'5-6s', tip:'Chairs, tables, people waiting. 5–6 seconds. Quiet human presence.',                                           description:'Pan slowly across the lobby seating area — chairs, low tables, waiting people. 5–6 seconds. This is the quiet human world of a lobby — the side that isn\'t rushing.' },
        { id:'cl-13',type:'slow-mo', section:'Level Up',    title:'60fps: people crossing the lobby',                completed:false, custom:false, fps:60,  app:null, duration:'6-8s', tip:'The flow of a lobby at 60fps is mesmerising. Switch and hold for 6–8 seconds.',                               description:'Switch to 60fps slow-motion and capture people crossing the lobby at their natural pace. At half speed, the purposeful flow of people through architecture becomes genuinely beautiful. 6–8 seconds.' },
        { id:'cl-14',type:'static',  section:'Level Up',    title:'Static 2x: receptionist or security desk in quiet moment', completed:false, custom:false, fps:null, app:null, duration:'5s',   tip:'2x from across the lobby. Authentic and unposed.',                                                        description:'From across the lobby on your 2x lens, find a quiet moment at the reception or security desk. Lock the frame and hold for 5 seconds. The person at their station — authentic, unposed, at work.' },
        { id:'cl-15',type:'static',  section:'Go Further',  title:'Extreme close-up: marble, stone, or tile surface',completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'3–4 inches. Cinema mode. The material world of a lobby up close.',                                             description:'Get 3–4 inches from a marble floor, stone wall, or decorative tile. Cinema mode if available. At this scale, the veining of stone or the depth of mosaic becomes abstract and beautiful.' },
        { id:'cl-16',type:'static',  section:'Go Further',  title:'Low angle along the lobby floor toward entrance',  completed:false, custom:false, fps:null, app:null, duration:'5s',   tip:'Phone at floor level. The expanse of a marble floor from this angle is striking.',                            description:'Set your phone at floor level and point it toward the entrance. The expanse of lobby floor stretching to the entrance, with legs and feet moving through the frame, is a completely different perspective on a familiar space.' },
        { id:'cl-17',type:'static',  section:'Go Further',  title:'Reflection in glass doors or polished wall',      completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'Find the best lobby reflection and hold still. The layered, doubled lobby.',                                   description:'Find a glass door, polished wall, or reflective lobby surface that shows a doubled, layered version of the space. Lock your camera on the reflection. 4–5 seconds. The abstracted lobby is often more interesting than the real one.' },
        { id:'cl-18',type:'custom',  section:'Your Shots',  title:'Your Shot: How do people move through this lobby?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Overhead or side-on locked static. Let the movement happen in the frame around you.',                       description:'Rushed or unhurried? Direct paths or meandering? Find the angle — overhead from a mezzanine, side-on, front-on — where the movement becomes a pattern. Where is it most interesting to watch from?' },
        { id:'cl-19',type:'custom',  section:'Your Shots',  title:'Your Shot: Where is the best quality of light in this space?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Lock still and point at the source or what it\'s illuminating. 4–5 seconds minimum.',                     description:'A skylight, a window wall, artificial light on marble, a spotlight on artwork. Every lobby has one place where the light is worth shooting. Find it. Then decide: do you point at the light itself, or at what it\'s hitting?' },
        { id:'cl-20',type:'custom',  section:'Your Shots',  title:'Your Shot: What one frame would tell someone what this lobby is really like?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Not the official shot. The one that honestly captures this place\'s character.',                         description:'If you could only send one image to represent this lobby — not the wide establishing shot, not the logo — what would it be? Could be wide, tight, people, materials, light. Trust the instinct.' },
      ],
    },

    meta: { title:'The Park', tagline:'Find the film hiding in your nearest green space', icon:'🌳', badgeId:'park-ranger', difficulty:'Progressive', shotCount:20 },
    project: {
      id: 'challenge-park-v1', name: 'Challenge: The Park', isChallenge: true, badgeId: 'park-ranger', videoType: 'experience-coverage',
      event: 'The Park', location: 'A Park Near You', topic: 'B-Roll School Challenge', duration: 60, skillLevel: 2,
      sections: ['Foundation','Level Up','Go Further','Your Shots'],
      shots: [
        { id:'cp-1', type:'static',  section:'Foundation',  title:'Wide static: park entrance or path leading in',   completed:false, custom:false, fps:null, app:null, duration:'5s',   tip:'Frame a path into the distance. Vanishing point as opening frame.',                                             description:'Stand at the park entrance and lock your camera on a path or gate leading inward. Hold completely still for 5 seconds. The path leading away creates instant depth.' },
        { id:'cp-2', type:'tilt',    section:'Foundation',  title:'Tilt up: tall tree or monument',                  completed:false, custom:false, fps:null, app:null, duration:'6-7s', tip:'From roots to canopy. Slow and deliberate. 6–7 seconds.',                                                       description:'Find the most impressive tree, statue, or tall feature in the park. Frame the base, then slowly tilt upward to reveal its full height. 6 to 7 seconds of committed movement.' },
        { id:'cp-3', type:'static',  section:'Foundation',  title:'Close static: flowers, bark, or leaves',          completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'4–6 inches. Portrait mode if available. Nature rewards closeness.',                                             description:'Get very close to a flower, piece of textured bark, or cluster of leaves. Lock your camera 4–6 inches away and hold completely still. These close-up nature shots add visual texture.' },
        { id:'cp-4', type:'pan',     section:'Level Up',    title:'Wide slow pan: open field, lake, or lawn',        completed:false, custom:false, fps:null, app:null, duration:'8-10s', tip:'8–10 seconds. Let the scale be felt.',                                                                           description:'Find the widest open area and pan slowly across it — meadow, lawn, lake edge. 8 to 10 seconds from one end to the other. Let the scale and the sky breathe.' },
        { id:'cp-5', type:'tracking',section:'Level Up',    title:'Track: someone walking a path',                   completed:false, custom:false, fps:null, app:null, duration:'6-7s', tip:'Parallel, bent knees, left or right third of frame.',                                                           description:'Find a willing person walking a path. Walk alongside them at their pace, bent knees, camera at waist height. Keep them in the left or right third of frame — give them walking room.' },
        { id:'cp-6', type:'slow-mo', section:'Level Up',    title:'60fps: water feature, wind in trees, or play',    completed:false, custom:false, fps:60,  app:null, duration:'6-8s', tip:'Switch before the moment begins.',                                                                               description:'Find a water feature, wind through leaves, or children playing and switch to 60fps slow-motion. 6–8 seconds of recording gives you rich, beautiful material.' },
        { id:'cp-7', type:'static',  section:'Go Further',  title:'Ground level: phone flat on grass pointing up',   completed:false, custom:false, fps:null, app:null, duration:'5s',   tip:'"Portrait mode turns this from interesting to extraordinary. Hold for 5 seconds."',                            description:'Set your phone flat on the grass pointing up at a tree, the sky, or a tall feature. Portrait mode if available. The ground-level perspective transforms a familiar scene.' },
        { id:'cp-8', type:'static',  section:'Go Further',  title:'Overhead: phone straight up pointing down at ground', completed:false, custom:false, fps:null, app:null, duration:'5s', tip:'"Arm high, completely still. Top-down view — just texture and colour."',                                     description:'Hold your phone directly overhead pointing straight down at grass, flowers, or a path texture. Arm as high as comfortable, completely still. Pure top-down texture.' },
        { id:'cp-9', type:'custom',  section:'Your Shots',  title:'Your Shot: What is wildest about this park right now?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Nature at its most unruly rewards extreme close-up or wide static equally.',                                 description:'Even the most manicured park has something untamed — a tree growing sideways, incoming weather, an animal, unpruned growth. What resists the human hand here? Get close or stand back — which framing makes it look wildest?' },
        { id:'cp-10',type:'custom',  section:'Your Shots',  title:'Your Shot: What shows the season most clearly in this park today?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Low-angle light rewards a slow tilt. Colour rewards close-up. Both reward patience.',                       description:'A bare tree, autumn colour, new growth, frost on grass, the angle of the sun on a path. What single frame says "this specific season, in this specific park"? The moment is only available today.' },
        { id:'cp-11',type:'static',  section:'Foundation',  title:'Static: bench or path detail',                    completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'A well-worn bench or winding path. 4–5 seconds. Quiet human presence in nature.',                               description:'Find a bench, worn path, or resting spot with a strong sense of place. Lock your camera and hold for 4–5 seconds. These quiet human details anchor the viewer in real life.' },
        { id:'cp-12',type:'pan',     section:'Foundation',  title:'Pan: where the park meets the city',              completed:false, custom:false, fps:null, app:null, duration:'6-8s', tip:'The edge where nature ends and pavement begins. 6–8 seconds.',                                                 description:'Find the boundary where the park meets the surrounding street or city. Pan slowly along that edge — trees on one side, buildings on the other. 6–8 seconds. The contrast tells a story about where you are.' },
        { id:'cp-13',type:'static',  section:'Level Up',    title:'Static 2x: person or couple on bench from distance', completed:false, custom:false, fps:null, app:null, duration:'5s',   tip:'2x from far enough not to intrude. Authentic human rest.',                                                    description:'From a respectful distance on your 2x lens, find someone resting on a bench or sitting in the grass. Lock and hold for 5 seconds. Don\'t disturb them — the authentic quality of genuine rest is the value.' },
        { id:'cp-14',type:'tilt',    section:'Level Up',    title:'Tilt up: waterfall, fountain, or steep hillside',  completed:false, custom:false, fps:null, app:null, duration:'5-7s', tip:'From base to top. Let the height or flow reveal itself.',                                                       description:'Find a waterfall, fountain, or steeply rising hillside. Frame the very base and tilt slowly upward to reveal its full extent. 5–7 seconds. Height in nature is always worth a tilt.' },
        { id:'cp-15',type:'static',  section:'Go Further',  title:'Extreme close-up: bark, petal, or moss at 3–4 inches', completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'Portrait mode. Nature at this scale reveals extraordinary detail.',                                          description:'Get 3–4 inches from tree bark, a flower petal, or a patch of moss. Portrait mode if available. Nature at macro scale has astonishing texture, colour, and structure. 4–5 seconds completely still.' },
        { id:'cp-16',type:'static',  section:'Go Further',  title:'Low angle: phone on path pointing up at walking figure', completed:false, custom:false, fps:null, app:null, duration:'5s', tip:'Their feet, legs, and the sky beyond. Unexpected framing.',                                                description:'Set your phone flat on the path pointing upward at a person walking toward you or past you. Their feet, legs, and the sky or trees behind them create an unexpected, cinematic perspective.' },
        { id:'cp-17',type:'slow-mo', section:'Go Further',  title:'120fps: falling leaves, rain, or petals blowing',  completed:false, custom:false, fps:120, app:null, duration:'6-8s', tip:'Switch to 120fps for nature in pure slow motion. Extraordinary at any speed.',                                  description:'Switch to 120fps slow-motion and hold on falling leaves, raindrops, blowing petals, or a breeze through long grass. Nature at 5x slow motion is one of the most beautiful things a phone can capture.' },
        { id:'cp-18',type:'custom',  section:'Your Shots',  title:'Your Shot: Where do people most naturally come to rest here?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'2x from a respectful distance, locked still. Or overhead from any elevation you can find.',               description:'The bench everyone picks, the slope people choose, the spot under a particular tree. Human habits in parks create worn paths and preferred corners. Find one. Close, wide, or overhead — what makes the resting feel most true?' },
        { id:'cp-19',type:'custom',  section:'Your Shots',  title:'Your Shot: What texture is most extraordinary in this park right now?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Portrait mode. 3–4 inches. Hold completely still. Let the texture fill the entire frame.',               description:'Bark, stone, water surface, grass, moss, lichen, a path. Get close to the most interesting surface you can find. What does the camera reveal at 3–4 inches that your eye alone couldn\'t see?' },
        { id:'cp-20',type:'custom',  section:'Your Shots',  title:'Your Shot: What sound in this park would make the best picture?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'This might be abstract — light through leaves, moving water, empty space. Trust it.',                     description:'Wind in leaves, water, birdsong, children, the quality of silence. If the sound could become a visual — what would you frame? What is the picture of that particular sound?' },
      ],

      id: 'challenge-city-v1', name: 'Challenge: City Streets', isChallenge: true, badgeId: 'city-wanderer', videoType: 'experience-coverage',

      sections: ['Foundation','Level Up','Go Further','Your Shots'],
      shots: [
        { id:'cs-1', type:'pan',     section:'Foundation',  title:'Wide pan: main pedestrian street',                completed:false, custom:false, fps:null, app:null, duration:'10s',  tip:'10 seconds. If it feels too slow, that\'s the right speed.',                                                    description:'Find your city\'s main pedestrian or commercial street and pan slowly across it from one end to the other. 10 seconds. Let the life of the street — people, colour, movement — fill the frame.' },
        { id:'cs-2', type:'static',  section:'Foundation',  title:'Static: pedestrians crossing or flowing',         completed:false, custom:false, fps:null, app:null, duration:'5-6s', tip:'Lock still. People through a fixed frame.',                                                                     description:'Find a pedestrian crossing, junction, or busy pavement. Lock your camera completely still and hold for 5–6 seconds. People flowing through a locked frame is one of the most cinematic things you can capture.' },
        { id:'cs-3', type:'static',  section:'Foundation',  title:'Close static: architectural detail',              completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'Door, ironwork, tile, carved stone. 4–6 inches. Portrait mode.',                                                description:'Get close to one interesting architectural detail unique to your city — a decorative door, patterned tiles, ironwork gate, or stone carving. Lock the camera and hold for 4–5 seconds.' },
        { id:'cs-4', type:'tilt',    section:'Level Up',    title:'Tilt up: building facade',                        completed:false, custom:false, fps:null, app:null, duration:'6-7s', tip:'Stand across the street. Pavement to roofline. 6–7 seconds.',                                                   description:'Stand back from your city\'s most interesting building. Frame the pavement at the base, then slowly tilt upward along the facade to the roofline or sky. 6–7 seconds.' },
        { id:'cs-5', type:'tracking',section:'Level Up',    title:'Walk into the street scene',                      completed:false, custom:false, fps:null, app:null, duration:'6-8s', tip:'Behind someone. Their perspective, your camera. Bent knees.',                                                    description:'Walk into the street from an entrance or alley, following behind someone as they lead you in. Bent knees, smooth movement. 6–8 seconds. The viewer feels like they\'re arriving.' },
        { id:'cs-6', type:'slow-mo', section:'Level Up',    title:'60fps: busy crossing or pedestrian flow',         completed:false, custom:false, fps:60,  app:null, duration:'6-8s', tip:'Switch before the light changes.',                                                                               description:'Switch to 60fps slow-motion and point at a busy pedestrian crossing or stream of people. When the light changes and people flow, press record. The slow-motion crowd movement is beautiful.' },
        { id:'cs-7', type:'static',  section:'Go Further',  title:'Ground level: phone on pavement pointing up at intersection', completed:false, custom:false, fps:null, app:null, duration:'5s', tip:'"The city from ant-level. Cinema mode if available."',                                                description:'Set your phone flat on the pavement pointing up at a busy intersection, building face, or sky above the street. The city from ground level looks completely different.' },
        { id:'cs-8', type:'zoom',    section:'Go Further',  title:'3x telephoto walk-back: compress a street scene', completed:false, custom:false, fps:null, app:null, duration:'5-6s', tip:'"Walk backward with 3x engaged until framing feels right. The background collapses."',                         description:'Switch to your phone\'s 3x optical lens, then physically walk backward until the street scene fills the frame. The background compression makes everyone look closer together — cinematic compression.' },
        { id:'cs-9', type:'custom',  section:'Your Shots',  title:'Your Shot: What could only be found on this specific street in this specific city?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Close detail or mid-shot with context. The specificity is the point.',                                     description:'A sign in a particular script, a local architecture detail, a type of market, a cultural tradition, a face only found here. What makes this street impossible to film anywhere else in the world?' },
        { id:'cs-10',type:'custom',  section:'Your Shots',  title:'Your Shot: Where is the strongest light on this street right now?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Lock still and point at the light or what it\'s hitting. Let the city move around the frame.',            description:'Sun on a building face, shadow cutting across a pavement, light in a gap between towers, a backlit figure. The light on city streets is constantly changing. Where is it doing something interesting right now?' },
        { id:'cs-11',type:'static',  section:'Foundation',  title:'Static: a single shop window display',            completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'A frame within a frame. Let the world reflect in the glass. 4–5 seconds.',                                     description:'Find an interesting shop window — a display, reflection of the street, or combination of both. Lock your camera completely still for 4–5 seconds. The glass gives you a frame within a frame.' },
        { id:'cs-12',type:'pan',     section:'Foundation',  title:'Pan: row of shopfronts or market stalls',         completed:false, custom:false, fps:null, app:null, duration:'7-9s', tip:'The rhythm of a street. 7–9 seconds, no faster.',                                                               description:'Find a row of shopfronts, market stalls, or café frontages and pan slowly across them. 7–9 seconds. Capture the rhythm — colour, variety, layered signage, the specific character of this street.' },
        { id:'cs-13',type:'static',  section:'Level Up',    title:'Static 2x: street performer, vendor, or café customer', completed:false, custom:false, fps:null, app:null, duration:'5-6s', tip:'2x from distance. Candid quality is the value. Don\'t disturb.',                                           description:'From 10–15 feet on your 2x lens, find a street performer, market vendor, or person at an outdoor café table. Lock and hold for 5–6 seconds. The candid, unposed quality of authentic street life is everything.' },
        { id:'cs-14',type:'tilt',    section:'Level Up',    title:'Tilt up building corner where two facades meet',  completed:false, custom:false, fps:null, app:null, duration:'6-7s', tip:'Start at street level, reveal the roofline. The corner gives it geometry.',                                    description:'Find the corner where two building facades meet. Frame the pavement at the corner base and tilt slowly upward, revealing both facades converging to the roofline above. The diagonal geometry is dynamic.' },
        { id:'cs-15',type:'static',  section:'Go Further',  title:'Extreme close-up: worn stone, graffiti, or metal surface', completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'3–4 inches. Cinema mode. The street\'s skin is surprisingly beautiful.',                              description:'Get 3–4 inches from a worn stone step, a patch of graffiti, a metal drain grate, or a textured wall. Cinema mode if available. Streets have extraordinary surface texture that nobody stops to look at.' },
        { id:'cs-16',type:'static',  section:'Go Further',  title:'Low angle: phone on pavement looking along the street', completed:false, custom:false, fps:null, app:null, duration:'5s',   tip:'Hundreds of feet and the city rising above. Pure geometry from ground level.',                               description:'Set your phone flat on the pavement pointing along the street. Feet, legs, and the city rising above create a completely different visual language. Hold still for 5 seconds.' },
        { id:'cs-17',type:'static',  section:'Go Further',  title:'Reflection: shop window, puddle, or car roof',    completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'The city reflected back at itself. Find the best reflection and hold still.',                                   description:'Find a shop window, a puddle after rain, or a car roof that reflects the street scene. Lock your camera on the reflection. 4–5 seconds. The city seen indirectly is often more interesting than head-on.' },
        { id:'cs-18',type:'custom',  section:'Your Shots',  title:'Your Shot: What is the most compelling thing on this street nobody else is looking at?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Close enough to show what makes it worth stopping for. Static or slow pan.',                             description:'The overlooked detail — a colour, a small shop, a building detail, a person sitting quietly while the world moves past. What requires you to stop and actually look? Find it. Frame it.' },
        { id:'cs-19',type:'custom',  section:'Your Shots',  title:'Your Shot: How does this street connect people right now?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'2x from distance, locked still. Or tracking if the social moment moves.',                                  description:'A crossing, a shared pavement, a queue, a market transaction, a chance encounter. Streets are fundamentally social. What is the human interaction happening here right now? Observe from a respectful distance.' },
        { id:'cs-20',type:'custom',  section:'Your Shots',  title:'Your Shot: What on this street feels like it\'s in the middle of changing?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Stand back enough to show the before-and-after in a single frame — new next to old.',                  description:'What\'s being built, what\'s disappearing, what\'s brand new next to something that\'s been here for generations? What has the visual quality of being in between? One frame that says: this moment, in transition.' },

        { id:'caf-1', type:'static',  section:'Foundation',  title:'Static: café exterior and full frontage',         completed:false, custom:false, fps:null, app:null, duration:'5s',   tip:'Stand back. Show the whole building, not just the sign.',                                                        description:'Stand across the street or a few metres back. Lock your camera on the full café frontage — sign, tables, door, pavement. Hold completely still for 5 seconds.' },
