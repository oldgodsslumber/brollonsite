        { id:'caf-3', type:'static',  section:'Foundation',  title:'Close static: hands on a cup or saucer detail',   completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'5–6 inches. Portrait mode for texture and subject isolation.',                                                  description:'Get your camera 5–6 inches above a coffee cup, saucer, or hands on a table. Lock completely still. 4–5 seconds. These intimate tactile details make a café feel real.' },
        { id:'caf-4', type:'static',  section:'Level Up',    title:'Static zoom: candid customer reading or working',  completed:false, custom:false, fps:null, app:null, duration:'5s',   tip:'2x from across the room. Don\'t disturb.',                                                                      description:'From across the room on your 2x optical lens, find someone absorbed in reading, writing, or working. Lock the frame and hold for 5 seconds. The candid quality is the whole value.' },
        { id:'caf-5', type:'slow-mo', section:'Level Up',    title:'60fps: milk pour or steam rising',                 completed:false, custom:false, fps:60,  app:null, duration:'6-8s', tip:'Switch before the pour. Liquid at slow-mo is extraordinary.',                                                   description:'Switch to 60fps slow-motion and capture a milk pour, coffee drip, or steam rising. 6–8 seconds of filming gives you beautiful slow-motion material to work with.' },
        { id:'caf-6', type:'static',  section:'Level Up',    title:'Window light on a table or surface',               completed:false, custom:false, fps:null, app:null, duration:'5s',   tip:'Find the best light in the room. Point down at the surface.',                                                   description:'Find the table where window light falls most beautifully. Point your camera down at the table surface — coffee cup, notebook, light and shadow patterns. Lock the camera and hold for 5 seconds.' },
        { id:'caf-7', type:'static',  section:'Go Further',  title:'Overhead: phone above coffee cup pointing straight down', completed:false, custom:false, fps:null, app:null, duration:'5s', tip:'"Bird\'s eye of a café table. Cinema mode blurs the background beautifully. Arm high, completely still."',  description:'Hold your phone directly above a coffee cup pointing straight down. Arm as high as comfortable, completely still for 5 seconds. Cinema mode or portrait mode if available.' },
        { id:'caf-8', type:'static',  section:'Go Further',  title:'Extreme close-up: coffee surface texture or foam', completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'"3–4 inches from the surface. Cinema mode or portrait mode if available — draws the eye directly to the texture."', description:'Get 3–4 inches from a coffee surface, foam pattern, or condensation on a glass. Cinema mode or portrait mode if your phone has it — the blur draws the eye directly to the texture.' },
        { id:'caf-9', type:'custom',  section:'Your Shots',  title:'Your Shot: What is the ritual that defines this café?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Wide for context, or close enough to see the hands. Slow-mo if it involves liquid.',                        description:'The way the barista makes coffee, the regulars who arrive at a particular time, the way orders are taken. Every café has a ritual at its core. What is this one\'s? How do you frame the ritual — its context, or its detail?' },
        { id:'caf-10',type:'custom',  section:'Your Shots',  title:'Your Shot: Where is the conversation happening right now?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'2x locked still from across the room. Don\'t approach. Let it play out in the frame.',                    description:'Not a posed couple — the actual lean-in, the shared laugh, the serious face over a phone. From a distance, completely still, on your 2x lens. What does human connection look like in this café today?' },
        { id:'caf-11',type:'static',  section:'Foundation',  title:'Static: café chalkboard or menu board',           completed:false, custom:false, fps:null, app:null, duration:'4s',   tip:'The specific language of a café. Hold still. 4 seconds.',                                                      description:'Find the café\'s chalkboard menu or specials board. Lock your camera completely still and hold for 4 seconds. The handwriting, the specific offerings, the erasures and additions tell the story of this particular place.' },
        { id:'caf-12',type:'tilt',    section:'Foundation',  title:'Tilt up behind the counter',                      completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'From the counter surface to the barista\'s face or the machine above. 4–5 seconds.',                            description:'Stand near the counter and frame the surface — tamper, coffee grounds, cups. Slowly tilt upward to reveal the machine, then the barista at work above. 4–5 seconds. The world behind the counter revealed.' },
        { id:'caf-13',type:'tracking',section:'Level Up',    title:'Walk-in tracking shot: enter from outside',        completed:false, custom:false, fps:null, app:null, duration:'5-7s', tip:'From street to interior in one continuous move. Bent knees through the door.',                                 description:'Start outside the café and walk in through the door, camera at waist height, bent knees. 5–7 seconds. The transition from street to interior — the bell above the door, the warmth — captured in one move.' },
        { id:'caf-14',type:'static',  section:'Level Up',    title:'Static: café window from outside, looking in',    completed:false, custom:false, fps:null, app:null, duration:'5s',   tip:'Interior through glass. People inside, world reflected outside. 5 seconds.',                                   description:'Stand outside and frame the café window — people inside, light and warmth within, your street reflected in the glass. Lock the camera and hold for 5 seconds. The layered view of inside and outside simultaneously.' },
        { id:'caf-15',type:'static',  section:'Go Further',  title:'Extreme close-up: coffee grounds, sugar, or pastry texture', completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'3–4 inches. Cinema mode. The micro-world of a café.',                                              description:'Get 3–4 inches from coffee grounds in a portafilter, sugar crystals on a surface, or the flaky texture of a pastry. Cinema mode if available. The micro-world of a café is extraordinary at this scale.' },
        { id:'caf-16',type:'static',  section:'Go Further',  title:'Table surface level: phone flat shooting along the table', completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'"Table-level framing transforms a cup into a landmark."',                                             description:'Set your phone flat on the table shooting along the surface. A coffee cup in the foreground becomes a landmark, with the café interior stretching behind it. Cinema mode for the shallow depth.' },
        { id:'caf-17',type:'slow-mo', section:'Go Further',  title:'120fps: espresso shot dropping into cup',          completed:false, custom:false, fps:120, app:null, duration:'4-6s', tip:'3–4 inches at 120fps. The dark cascade is extraordinary.',                                                     description:'Get 3–4 inches from a cup and switch to 120fps slow-motion. Capture the espresso shot dropping in, or a milk pour, or ice being dropped. At 5x slow motion, liquid pouring into a cup is one of the most satisfying things you can film.' },
        { id:'caf-18',type:'custom',  section:'Your Shots',  title:'Your Shot: What is the best contrast between inside warmth and outside world?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Inside-outside glass shots reward static frames that show both worlds simultaneously.',                    description:'The window separates interior warmth and exterior cool. Where is that contrast most beautiful? From inside looking out at the light, or from outside looking in at the glow and the people within?' },
        { id:'caf-19',type:'custom',  section:'Your Shots',  title:'Your Shot: What single object best represents this specific café?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Close enough that context blurs and the object fills the frame. Portrait mode.',                          description:'Not a logo — an object that couldn\'t be anywhere else. The particular machine, a plant someone is clearly attached to, a sign, a stack of something. The object that says: this place, specifically.' },
        { id:'caf-20',type:'custom',  section:'Your Shots',  title:'Your Shot: What does the moment someone decides to leave look like?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'2x from distance. The candid departure has more warmth than any posed shot.',                            description:'Getting the bill, a last sip, someone putting on a coat. The slight reluctance before standing up. The moment of leaving carries the weight of the whole visit. Find that moment without announcing yourself.' },

      id: 'challenge-golden-v1', name: 'Challenge: Golden Hour', isChallenge: true, badgeId: 'golden-hour', videoType: 'experience-coverage',

      sections: ['Foundation','Level Up','Go Further','Your Shots'],
      shots: [
        { id:'gh-1', type:'static',  section:'Foundation',  title:'Wide static: golden light on any scene',          completed:false, custom:false, fps:null, app:null, duration:'5-6s', tip:'Frame the warmest part of your view. 5–6 seconds.',                                                              description:'Go outside 30 minutes before local sunset. Frame the widest view of the scene in front of you and lock on the warmest, most golden light you can find. Hold for 5–6 seconds.' },
        { id:'gh-2', type:'static',  section:'Foundation',  title:'Your long shadow stretching away',                completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'Face away from the sun. The longer the shadow, the better the light.',                                           description:'Face directly away from the setting sun. Your shadow — and everything else\'s — stretches long in front of you. Lock the camera looking down at your shadow and the warm light. Hold for 4–5 seconds.' },
        { id:'gh-3', type:'tilt',    section:'Foundation',  title:'Sky gradient tilt',                               completed:false, custom:false, fps:null, app:null, duration:'5-6s', tip:'From the horizon up to the deep blue overhead. The natural colour story.',                                       description:'Point your camera at the horizon line and slowly tilt upward into the sky. The gradient — warm amber and orange near the horizon transitioning to deeper blue overhead — is a natural colour story.' },
        { id:'gh-4', type:'static',  section:'Level Up',    title:'Silhouette against the sky',                      completed:false, custom:false, fps:null, app:null, duration:'5s',   tip:'Subject between you and the sun. Expose for the bright sky.',                                                   description:'Position a person, tree, or tall subject between you and the setting sun. Tap the bright sky area on your screen to expose for it — your subject becomes a pure black silhouette. Hold for 5 seconds.' },
        { id:'gh-5', type:'pan',     section:'Level Up',    title:'Warm light sweeping across a scene',              completed:false, custom:false, fps:null, app:null, duration:'8s',   tip:'8 seconds. The light transforms everything it touches.',                                                         description:'Pan slowly across your scene — a street, a park, a waterfront, a roofline. 8 seconds. The warm golden light transforms whatever you pan across. This is the shot that convinces people to go outside.' },

        { id:'gh-7', type:'static',  section:'Go Further',  title:'Ground level: phone low pointing up at tree or silhouette', completed:false, custom:false, fps:null, app:null, duration:'5s', tip:'"Portrait mode here creates a dramatic, compressed effect."',                                             description:'Set your phone low on the ground pointing up at a tree, person, or any tall subject against the golden sky. Portrait mode transforms this from interesting to extraordinary.' },
        { id:'gh-8', type:'static',  section:'Go Further',  title:'Extreme close-up: warm light on a surface texture', completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'"4–6 inches from a lit surface — stone, bark, a hand, a wall. Cinema mode if available. The warmth becomes almost tactile."', description:'Get 4–6 inches from wherever the late light lands most warmly — a brick wall, someone\'s hands, a leaf catching the glow. Cinema mode if available. The warmth becomes tactile.' },
        { id:'gh-9', type:'custom',  section:'Your Shots',  title:'Your Shot: What is the most ordinary thing that golden light transforms tonight?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Low angle or close-up makes the mundane monumental. Portrait mode for the glow.',                       description:'A kerb, a car park, a fence, a drainpipe. Golden hour makes the mundane extraordinary. Find the least glamorous thing the light is falling on right now. Shoot it like it\'s beautiful — because right now, it genuinely is.' },
        { id:'gh-10',type:'custom',  section:'Your Shots',  title:'Your Shot: Where is the light warmest right now, and what is in it?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Expose for the brightest area. Everything in shadow goes deep and dramatic. Hold still.',               description:'Find the warmest patch of light you can see. Is there a person, a surface, a colour in that warmth? Point the camera directly at whatever the light is transforming most dramatically. Don\'t move until you\'ve held it for 5 seconds.' },
        { id:'gh-11',type:'static',  section:'Foundation',  title:'Static: warm light through a window onto a surface', completed:false, custom:false, fps:null, app:null, duration:'5s',   tip:'The sun coming inside. Lock where it lands. 5 seconds.',                                                    description:'Find where golden hour light enters a room and lands on a surface — a wall, a floor, a table. Lock your camera on where the light falls. 5 seconds. The patch of warmth is the subject.' },
        { id:'gh-12',type:'pan',     section:'Foundation',  title:'Pan: your neighbourhood in golden light',          completed:false, custom:false, fps:null, app:null, duration:'8s',   tip:'The familiar transformed. 8 seconds across your street or view.',                                             description:'Pan slowly across your street, neighbourhood, or the view from wherever you are. 8 seconds. Golden hour transforms the most ordinary scene. This is the shot that makes people look twice at their own streets.' },
        { id:'gh-13',type:'tracking',section:'Level Up',    title:'Walk toward the light, over-shoulder',             completed:false, custom:false, fps:null, app:null, duration:'6-8s', tip:'Lead with a person walking into the golden light. Their silhouette and the warmth ahead.',                     description:'Follow behind a person walking toward the setting sun. Over-shoulder, bent knees. 6–8 seconds. Their silhouette in the foreground, the golden light flooding the frame ahead — one of the most cinematic things you can shoot.' },
        { id:'gh-14',type:'static',  section:'Level Up',    title:'Static 2x: distant subject in golden light',       completed:false, custom:false, fps:null, app:null, duration:'5-6s', tip:'A building, a person, a tree — compressed and golden. 2x from distance.',                                     description:'Switch to 2x and find a distant subject — a building catching the last light, a tree in gold, a person on a horizon. Lock and hold for 5–6 seconds. The telephoto compression flattens the light beautifully.' },
        { id:'gh-15',type:'static',  section:'Go Further',  title:'Extreme close-up: warm light on skin, hair, or leaves', completed:false, custom:false, fps:null, app:null, duration:'4-5s', tip:'3–4 inches. Portrait mode. Golden hour light on texture.',                                              description:'Get 3–4 inches from a surface in golden light — skin, hair, a leaf, a wall. Portrait mode if available. The warmth of golden hour at this scale becomes almost tactile. 4–5 seconds completely still.' },
        { id:'gh-16',type:'static',  section:'Go Further',  title:'Low angle: phone on ground pointing at silhouette against golden sky', completed:false, custom:false, fps:null, app:null, duration:'5s', tip:'"The most dramatic framing possible. Portrait mode."',                                         description:'Set your phone flat on the ground pointing upward at a person, tree, or structure against the golden sky. Portrait mode if available. From ground level, even a small subject becomes monumental against the sky.' },
        { id:'gh-17',type:'static',  section:'Go Further',  title:'Overhead: looking straight down at a surface in golden light', completed:false, custom:false, fps:null, app:null, duration:'5s', tip:'A path, a floor, sand, or grass. The colour is the subject.',                                         description:'Hold your phone directly overhead pointing straight down at a surface lit in golden light — a path, paving, sand, grass. Arm as high as comfortable, completely still. The warm colour and texture are the entire frame.' },
        { id:'gh-18',type:'custom',  section:'Your Shots',  title:'Your Shot: What silhouette would you most want to exist?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Subject between you and sun. Tap the sky to expose for it. Hold still. 5 seconds.',                       description:'A person, a tree, a building, a bicycle — anything between you and the sun becomes a silhouette. What shape, against what sky, would be the most compelling image you could make right now? Choose the shape deliberately.' },
        { id:'gh-19',type:'custom',  section:'Your Shots',  title:'Your Shot: What texture becomes most beautiful in this specific light?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'3–4 inches at a raking angle to the surface. Portrait mode reveals every detail.',                      description:'Rough stone, bark, concrete, a wall, a leaf, someone\'s hands. Golden hour rakes across surfaces at low angles and reveals texture that midday flattens completely. What surface gains most from this light? Get as close as you need to.' },
        { id:'gh-20',type:'custom',  section:'Your Shots',  title:'Your Shot: What do you want to remember about being outside right now?', completed:false, custom:true, fps:null, app:null, duration:null, tip:'Trust whatever comes first. The instinct in golden hour is almost always right.',                       description:'Not a technique question. Not about the camera. You\'re outside, the light is extraordinary, and you have one chance to say something true about this moment. What is it?' },

/* Extract ordered section names from a shots array (preserving first-seen order) */
function extractSections(shots) {
  const seen = new Set();
  const out  = [];
  for (const s of shots) {
    const sec = (s.section || 'Unsectioned');
    if (!seen.has(sec)) { seen.add(sec); out.push(sec); }
  }
  return out;
}

/* Return shots grouped by section, respecting project.sections order */
function shotsBySection(project) {
  const shots    = project.shots || [];
  const sections = project.sections?.length ? project.sections : extractSections(shots);
  const map      = {};
  for (const sec of sections) map[sec] = [];
  /* Shots with unknown section fall into their own bucket at the end */
  for (const s of shots) {
    const sec = s.section || 'Unsectioned';
    if (!map[sec]) { sections.push(sec); map[sec] = []; }
    map[sec].push(s);
  }
  return { sections, map };
}

/* Ensure project.sections exists (backwards-compat for loaded old JSONs) */
function ensureSections(project) {
  if (!project.sections || !project.sections.length) {
    project.sections = extractSections(project.shots || []);
  }
}

/* ──────────────────────────────────────────
   LENS DETECTION
────────────────────────────────────────── */
async function detectLenses() {
  try {
    if (!navigator.mediaDevices?.enumerateDevices) return;
    let devices = await navigator.mediaDevices.enumerateDevices();
    const vids   = devices.filter(d => d.kind === 'videoinput');
    /* If labels are blank we need permission first */
    if (vids.every(d => !d.label)) {
      try {
        const s = await navigator.mediaDevices.getUserMedia({video:true});
        s.getTracks().forEach(t => t.stop());
        devices = await navigator.mediaDevices.enumerateDevices();
      } catch { /* denied – skip */ return; }
    }
    const labels  = devices.filter(d => d.kind === 'videoinput').map(d => d.label.toLowerCase());
    const joined  = labels.join(' ');
    S.lensProfile = {
      ultrawide: /ultra[\s-]?wide|0\.5x/.test(joined),
      telephoto: /tele|3x|5x|optical\s?zoom/.test(joined),
      cinematic: /cine|depth|portrait/.test(joined),
      count: labels.filter(l=>l).length,
      labels,
    };
    /* Update badge if still on new project screen */
    const badge = document.getElementById('lens-badge');
    if (badge) badge.innerHTML = lensHtml();
  } catch { /* ignore */ }
}

function lensDesc() {
  if (!S.lensProfile || !S.lensProfile.labels.length) return null;
  const parts = [];
  if (S.lensProfile.ultrawide) parts.push('Ultrawide');
  if (S.lensProfile.telephoto) parts.push('Telephoto');
  if (S.lensProfile.cinematic) parts.push('Cinematic');
  if (!parts.length && S.lensProfile.count > 1) parts.push(S.lensProfile.count + ' cameras');
  return parts.length ? parts.join(' + ') : null;
}

function lensHtml() {
  const d = lensDesc();
  return d ? `<span class="lens-badge">📷 ${esc(d)} detected</span>` : '';
}

function lensPromptHint() {
  const manual = (S.profile?.camera || '').trim();
  const lines = [];
  if (S.lensProfile?.ultrawide) lines.push('ultrawide lens (great for wide establishing shots)');
  if (S.lensProfile?.telephoto) lines.push('telephoto/zoom lens (great for compressed close-ups and speaker shots)');
  if (S.lensProfile?.cinematic) lines.push('cinematic/portrait mode (great for shallow depth-of-field people shots)');
  if (manual && lines.length) return `\nCamera: ${manual} (${lines.join(', ')}). Include shots that leverage these lenses.`;
  if (manual) return `\nCamera: ${manual}. Suggest shots that suit this device.`;
  if (lines.length) return `\nThis user's phone has: ${lines.join(', ')}. Include shots that leverage these lenses.`;
  return '';
}

function buildSubjectSystemPrompt() {
  return `You are an expert LinkedIn content strategist helping professionals create thought-leadership talking head scripts. Your job is to write a tight, punchy script for a short-form LinkedIn video on a specific topic or point of view. No b-roll — just the script.

OUTPUT FORMAT: Return ONLY valid compact JSON. No markdown fences. No commentary. Schema:
{"projectName":"string","script":"string"}

SCRIPT RULES:
  - Target the requested duration (~2.3 spoken words per second). HARD CAP: 60 seconds (~140 words). Never exceed this.
  - Open with a hook: a counter-intuitive observation, a question the audience hasn't asked themselves, or a surprising statement about the topic. NEVER start with "Hey everyone" or introduce yourself.
  - Tone guide: professional = measured, 2–3 incisive observations; excited = high energy, personal story; personal = candid, honest, a moment of real reflection.
  - Structure: 3–5 short paragraphs, each 1–3 sentences. No bullet points. No headings.
  - Avoid: slang, filler phrases ("super excited", "amazing", "awesome"), anything that reads as a TikTok caption.
  - Close with a thought-provoking question or soft call to action that invites engagement.
  - Write in first person, natural spoken cadence, punctuated for breath pauses.
  - Infer a strong, specific professional insight from the topic.`;
}

function buildUserMessage(newDir) {
  const { eventName, topic, duration, role, subject, videoMode } = S.form;
  const skillLevel = S.profile?.skillLevel || 1;
  const tone       = S.profile?.tone || 'professional';
  const level      = SKILL_LABELS[skillLevel];
  const date       = new Date().toLocaleDateString('en-US', {month:'long',day:'numeric',year:'numeric'});
  const lens       = lensPromptHint();
  const shotCount  = Math.round(duration / 4);
  const dateSlug   = new Date().toISOString().slice(0,10);

  if (newDir) {
    const done   = S.project.shots.filter(s => s.completed);
    const undone = S.project.shots.filter(s => !s.completed);
    const brief  = videoMode === 'subject'
      ? `${duration}-second video on the topic: "${subject}".`
      : `${duration}-second video about "${topic}" at ${eventName}.`;
    return `Original brief: ${brief} Skill: ${level}.${lens}

SHOTS ALREADY FILMED – keep these VERBATIM in your response (do not alter them):
${JSON.stringify(done)}

SHOTS NOT YET FILMED – you may modify, replace, or remove these:
${JSON.stringify(undone.map(s=>({id:s.id,type:s.type,title:s.title})))}

NEW DIRECTION from the user: "${newDir}"

Rules: Keep completed shots exactly as-is. Revise unfilmed shots to fit the new direction. Total shot count should still be approximately ${shotCount}. Return the same JSON schema including the script field.`;
  }

  if (videoMode === 'subject') {
    const slug = (subject || '').trim().replace(/\s+/g,'-').replace(/[^a-zA-Z0-9-]/g,'') || 'My-Video';
    return `Write a ${duration}-second LinkedIn talking-head script (~${Math.round(duration * 2.3)} words). Hard cap: 60 seconds.
Topic: "${subject}".
Tone: ${tone}. Date: ${date}.

Suggested projectName: "${slug}-${dateSlug}"`;
  }

  const roleLine = role ? `Role: ${role}.` : '';
  const toneLine = `Script tone: ${tone}.`;
  return `Create a shot list and talking head script for a ${duration}-second experience coverage video (${shotCount} shots) about "${topic}" at ${eventName}. Skill level: ${level}. Date: ${date}. ${roleLine} ${toneLine}${lens}

Suggested projectName format: "${eventName.trim().replace(/\s+/g,'-')}-${dateSlug}"`;
}

async function callClaude(newDir) {
  if (!navigator.onLine) { showBanner('You appear to be offline. Connect to the internet and try again.', 'danger'); return; }

  goTo('loading');

  const payload = {
    model: 'claude-haiku-4-5-20251001',
    max_tokens: 4096,
    system: buildSystemPrompt(),
    messages: [{ role: 'user', content: buildUserMessage(newDir) }],
  };

  const fetchHdrs = { 'Content-Type': 'application/json' };

  let attempt = 0;
  while (attempt < 2) {
    attempt++;
    try {
      const res = await fetch('/api/claude', {
        method: 'POST',
        headers: fetchHdrs,
        body: JSON.stringify(payload),
      });

      if (res.status === 401) { showBanner('API not configured — contact your admin.', 'danger'); goTo('home'); return; }
      if (!res.ok) {
        const err = await res.json().catch(()=>({}));
        throw new Error(err.error?.message || 'HTTP ' + res.status);
      }

      const data = await res.json();
      let text = (data.content?.[0]?.text || '').trim();
      /* Strip possible markdown fences */
      text = text.replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/```\s*$/,'').trim();

      let parsed;
      try { parsed = JSON.parse(text); }
      catch { if (attempt < 2) { await sleep(1500); continue; } throw new Error('Claude returned unexpected output — try again.'); }

      const isScriptOnly = !newDir && S.form.videoMode === 'subject';

      if (isScriptOnly) {
        if (!parsed.script || !String(parsed.script).trim()) throw new Error('No script was returned — try again.');
      } else if (!Array.isArray(parsed.shots) || !parsed.shots.length) {
        throw new Error('No shots were returned — try adjusting your inputs.');
      }

      if (newDir) {
        S.project.shots = parsed.shots;
        S.project.sections = extractSections(parsed.shots);
        if (parsed.script) S.project.script = parsed.script;
        saveProjects();
        S.newDirOpen = false;
        S.newDirText = '';
      } else if (isScriptOnly) {
        const pname = (parsed.projectName || S.form.projectName || autoNameValue()).slice(0,60);
        const project = {
          id:         generateId(),
          name:       pname,
          createdAt:  new Date().toISOString(),
          topic:      S.form.subject,
          duration:   S.form.duration,
          skillLevel: S.profile?.skillLevel || 1,
          videoType:  'thought-leadership',
          videoMode:  'subject',
          scriptOnly: true,
          tone:       S.profile?.tone || 'professional',
          subject:    S.form.subject,
          camera:     S.profile?.camera || '',
          script:     parsed.script,
          shots:      [],
          sections:   [],
        };
        S.projects.unshift(project);
        S.project = project;
        saveProjects();
        try {
          const n = (parseInt(localStorage.getItem('broll_projects_generated')||'0',10)||0) + 1;
          localStorage.setItem('broll_projects_generated', n);
          if (n >= 5) checkBadge('shot-caller');
        } catch(e) {}
      } else {
        const pname = (parsed.projectName || S.form.projectName || autoNameValue()).slice(0,60);
        const project = {
          id:         generateId(),
          name:       pname,
          createdAt:  new Date().toISOString(),
          event:      S.form.eventName,
          topic:      S.form.topic,
          duration:   S.form.duration,
          skillLevel: S.profile?.skillLevel || 1,
          videoType:  S.form.videoType,
          videoMode:  S.form.videoMode,
          role:       S.form.role,
          tone:       S.profile?.tone || 'professional',
          camera:     S.profile?.camera || '',
          script:     parsed.script || null,
          shots:      parsed.shots,
          sections:   extractSections(parsed.shots),
        };
        S.projects.unshift(project);
        S.project = project;
        saveProjects();
        /* Shot Caller badge: track generation count */
        try {
          const n = (parseInt(localStorage.getItem('broll_projects_generated')||'0',10)||0) + 1;
          localStorage.setItem('broll_projects_generated', n);
          if (n >= 5) checkBadge('shot-caller');
        } catch(e) {}
      }
      goTo('checklist');
      return;

    } catch(e) {
      if (attempt >= 2) {
        showBanner('Error: ' + e.message, 'danger', 7000);
        goTo(newDir ? 'checklist' : 'new');
        return;
      }
      await sleep(1500);
    }
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function downloadProject(id) {
  const p = (id && S.projects.find(x => x.id === id)) || S.project;
  if (!p) return;
  const blob = new Blob([JSON.stringify(p, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: (p.name||'broll-project') + '.json' });
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function onFileLoad(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const p = JSON.parse(e.target.result);
      if (!p.id || !Array.isArray(p.shots)) throw new Error('Not a valid Film Kit project file.');
      const idx = S.projects.findIndex(x => x.id === p.id);
      if (idx >= 0) S.projects[idx] = p; else S.projects.unshift(p);
      S.project = p;
      /* Restore form context for new-direction calls */
      S.form.eventName = p.event ? (p.location ? `${p.event}, ${p.location}` : p.event) : '';
      S.form.topic     = p.topic    || '';
      S.form.duration  = p.duration || 60;
      saveProjects();
      goTo('checklist');
    } catch(err) { showBanner('Could not load file: ' + err.message, 'danger'); }
  };
  reader.readAsText(file);
  input.value = '';
}

    if (S.project.isChallenge && S.project.badgeId) {
      const bid = S.project.badgeId;

      const sectionDone = sec => shots.filter(s => s.section === sec).every(s => s.completed);

/* ──────────────────────────────────────────
   SORT & SECTION MANAGEMENT
────────────────────────────────────────── */
function moveShot(id, dir) {
  if (!S.project) return;
  const shots = S.project.shots;
  const idx   = shots.findIndex(s => s.id === id);
  if (idx < 0) return;
  const shot  = shots[idx];
  const sec   = shot.section || 'Unsectioned';

  /* Find all shots in the same section, sorted by their position in the main array */
  const secIdxs = shots.reduce((acc, s, i) => { if ((s.section||'Unsectioned') === sec) acc.push(i); return acc; }, []);
  const posInSec = secIdxs.indexOf(idx);
  const targetPos = posInSec + dir;
  if (targetPos < 0 || targetPos >= secIdxs.length) return;

  /* Swap in the main array */
  const targetIdx = secIdxs[targetPos];
  shots.splice(idx, 1);
  shots.splice(targetIdx < idx ? targetIdx : targetIdx - 1 + 1, 0, shot);
  saveProjects();
  goTo('checklist');
}

function moveSection(name, dir) {
  if (!S.project) return;
  const secs = S.project.sections;
  const idx  = secs.indexOf(name);
  if (idx < 0) return;
  const swap = idx + dir;
  if (swap < 0 || swap >= secs.length) return;
  [secs[idx], secs[swap]] = [secs[swap], secs[idx]];
  saveProjects();
  goTo('checklist');
}

function renameSection(oldName, newName) {
  if (!S.project || !newName || newName === oldName) return;
  /* Update section array */
  const si = S.project.sections.indexOf(oldName);
  if (si >= 0) S.project.sections[si] = newName;
  else S.project.sections.push(newName);
  /* Update all shots in that section */
  for (const s of S.project.shots) {
    if ((s.section || 'Unsectioned') === oldName) s.section = newName;
  }
  saveProjects();
  /* No full re-render needed unless name changed; just update section count badges */
  updateProgress();
}

/* ── Pointer drag state ── */
const DS = {
  active:    false,
  type:      null,   /* 'shot' | 'section' */
  id:        null,
  ghost:     null,
  originEl:  null,
  offsetX:   0,
  offsetY:   0,
  lastOver:  null,   /* last highlighted element */
};

function bindDragHandles() {
  /* Shot handles */
  document.querySelectorAll('[data-drag-shot]').forEach(handle => {
    handle.addEventListener('pointerdown', e => startDrag(e, 'shot', handle.dataset.dragShot));
  });
  /* Section handles */
  document.querySelectorAll('[data-drag-section]').forEach(handle => {
    handle.addEventListener('pointerdown', e => startDrag(e, 'section', handle.dataset.dragSection));
  });
}

function startDrag(e, type, id) {
  e.preventDefault();
  e.stopPropagation();
  const originEl = type === 'shot'
    ? document.querySelector(`[data-shot-id="${id}"]`)
    : document.querySelector(`[data-section="${id}"]`);
  if (!originEl) return;

  const rect   = originEl.getBoundingClientRect();
  const ghost  = originEl.cloneNode(true);
  ghost.className += ' drag-ghost';
  ghost.style.cssText += `;position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;margin:0`;
  document.body.appendChild(ghost);
  originEl.classList.add('dragging');

  Object.assign(DS, {
    active: true, type, id,
    ghost, originEl,
    offsetX: e.clientX - rect.left,
    offsetY: e.clientY - rect.top,
    lastOver: null,
  });

  document.addEventListener('pointermove', onDragMove, { passive: false });
  document.addEventListener('pointerup',   onDragEnd);
  document.addEventListener('pointercancel', onDragEnd);
}

function onDragMove(e) {
  if (!DS.active) return;
  e.preventDefault();
  DS.ghost.style.top  = (e.clientY - DS.offsetY) + 'px';
  DS.ghost.style.left = (e.clientX - DS.offsetX) + 'px';

  /* Clear previous highlight */
  DS.lastOver?.classList.remove('drag-over-before','drag-over-after','drag-over-section');

  DS.ghost.style.pointerEvents = 'none';
  const under = document.elementFromPoint(e.clientX, e.clientY);
  DS.ghost.style.pointerEvents = '';

  if (DS.type === 'shot') {
    const card = under?.closest('[data-shot-id]');
    if (card && card !== DS.originEl) {
      const r   = card.getBoundingClientRect();
      const cls = e.clientY < r.top + r.height / 2 ? 'drag-over-before' : 'drag-over-after';
      card.classList.add(cls);
      DS.lastOver = card;
    } else {
      /* Highlight entire section drop zone */
      const sec = under?.closest('[data-section]');
      if (sec && !sec.contains(DS.originEl)) {
        sec.classList.add('drag-over-section');
        DS.lastOver = sec;
      }
    }
  } else {
    const sec = under?.closest('[data-section]');
    if (sec && sec !== DS.originEl) {
      sec.classList.add('drag-over-section');
      DS.lastOver = sec;
    }
  }
}

function onDragEnd(e) {
  if (!DS.active) return;
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup',   onDragEnd);
  document.removeEventListener('pointercancel', onDragEnd);

  DS.ghost?.remove();
  DS.originEl?.classList.remove('dragging');
  DS.lastOver?.classList.remove('drag-over-before','drag-over-after','drag-over-section');

  /* Compute drop */
  DS.ghost && (DS.ghost.style.pointerEvents = 'none');
  const under = document.elementFromPoint(e.clientX, e.clientY);

  if (DS.type === 'shot') {
    const card = under?.closest('[data-shot-id]');
    if (card && card !== DS.originEl) {
      const r      = card.getBoundingClientRect();
      const after  = e.clientY >= r.top + r.height / 2;
      dropShot(DS.id, card.dataset.shotId, after);
    } else {
      const sec = under?.closest('[data-section]');
      if (sec) dropShotToSection(DS.id, sec.dataset.section);
    }
  } else {
    const sec = under?.closest('[data-section]');
    if (sec && sec.dataset.section !== DS.id) dropSection(DS.id, sec.dataset.section);
  }

  Object.assign(DS, { active:false, type:null, id:null, ghost:null, originEl:null, lastOver:null });
}

function dropShot(shotId, targetShotId, insertAfter) {
  if (!S.project) return;
  const shots     = S.project.shots;
  const fromIdx   = shots.findIndex(s => s.id === shotId);
  const toIdx     = shots.findIndex(s => s.id === targetShotId);
  if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return;

  const shot      = shots[fromIdx];
  shot.section    = shots[toIdx].section; /* inherit target section */
  shots.splice(fromIdx, 1);
  const newTo     = shots.findIndex(s => s.id === targetShotId);
  shots.splice(insertAfter ? newTo + 1 : newTo, 0, shot);
  saveProjects();
  goTo('checklist');
  bindDragHandles();
}

function dropShotToSection(shotId, sectionName) {
  if (!S.project) return;
  const shots   = S.project.shots;
  const fromIdx = shots.findIndex(s => s.id === shotId);
  if (fromIdx < 0) return;
  const shot    = shots.splice(fromIdx, 1)[0];
  shot.section  = sectionName;
  /* Insert after last shot of that section */
  let ins = shots.length;
  for (let i = shots.length - 1; i >= 0; i--) {
    if ((shots[i].section||'Unsectioned') === sectionName) { ins = i + 1; break; }
  }
  shots.splice(ins, 0, shot);
  saveProjects();
  goTo('checklist');
  bindDragHandles();
}

function dropSection(fromName, beforeName) {
  if (!S.project) return;
  const secs    = S.project.sections;
  const fromIdx = secs.indexOf(fromName);
  if (fromIdx < 0) return;
  secs.splice(fromIdx, 1);
  const toIdx   = secs.indexOf(beforeName);
  secs.splice(toIdx >= 0 ? toIdx : secs.length, 0, fromName);
  saveProjects();
  goTo('checklist');
  bindDragHandles();
}

  const sections  = S.project?.sections || [];
  const typeOpts  = Object.entries(SHOT_TYPES)
    .map(([k, v]) => `<option value="${k}">${v.icon} ${v.label}</option>`).join('');
  const secOpts   = sections.map(s =>
    `<option value="${esc(s)}" ${S.customSectionTarget === s ? 'selected' : ''}>${esc(s)}</option>`
  ).join('');
  const secField  = sections.length
    ? `<div class="form-group">
        <label>Section</label>
        <select id="c-section">
          ${secOpts}
          <option value="__new__">＋ New section…</option>
        </select>
        <input type="text" id="c-section-new" placeholder="New section name" maxlength="40" autocomplete="off" style="display:none;margin-top:6px">
       </div>`
    : '';
  return `<div class="custom-form">
    <div class="custom-form-title">Add a Custom Shot</div>
    <div class="form-group">
      <label>Shot Type</label>
      <select id="c-type">${typeOpts}</select>
      <div class="type-hint" id="c-type-hint"></div>
    </div>
    ${secField}
    <div class="form-group">
      <label>Shot Title</label>
      <input type="text" id="c-title" placeholder="e.g. Close-up of my conference badge" maxlength="60" autocomplete="off">
    </div>
    <div class="form-group">
      <label>What to shoot and how</label>
      <textarea id="c-desc" placeholder="Describe the shot in detail…" rows="3"></textarea>
    </div>
    <div class="form-row">
      <button class="btn btn-primary" onclick="submitCustomShot()">Add Shot</button>
      <button class="btn btn-ghost"   onclick="cancelCustomShot()">Cancel</button>

}

function updateTypeHint() {
  const sel  = document.getElementById('c-type');
  const hint = document.getElementById('c-type-hint');
  if (!sel || !hint) return;
  const t = SHOT_TYPES[sel.value];
  if (t) { hint.textContent = t.what; hint.classList.add('visible'); }
  else   { hint.classList.remove('visible'); }
  /* Show/hide fps note */
  const fps = sel.value === 'slow-mo' ? ' · Shoot at 60fps or 120fps in your camera app.' : '';
  if (fps && t) hint.textContent = t.what + fps;
}

function submitCustomShot() {
  const title   = document.getElementById('c-title')?.value.trim();
  const desc    = document.getElementById('c-desc')?.value.trim();
  const typeVal = document.getElementById('c-type')?.value || 'custom';
  if (!title) { document.getElementById('c-title')?.focus(); return; }

  /* Resolve section */
  let section = S.customSectionTarget;
  const secSel = document.getElementById('c-section');
  if (secSel) {
    if (secSel.value === '__new__') {
      section = document.getElementById('c-section-new')?.value.trim() || 'Custom';
      if (!S.project.sections.includes(section)) S.project.sections.push(section);
    } else {
      section = secSel.value;
    }
  }
  if (!section && S.project?.sections?.length) section = S.project.sections[S.project.sections.length - 1];
  if (!section) section = 'Custom';

  const t    = SHOT_TYPES[typeVal] || SHOT_TYPES['custom'];
  const shot = {
    id: generateId(), type: typeVal, section,
    title, description: desc || t.what,
    duration: '3-5s', tip: t.what,
    app:  (typeVal === 'hyperlapse' || typeVal === 'timelapse') ? 'Mimo' : null,
    fps:  typeVal === 'slow-mo' ? '60' : null,
    completed: false, custom: true,
  };
  S.project.shots.push(shot);
  saveProjects();
  S.customFormOpen = false;
  S.customSectionTarget = null;
  goTo('checklist');
}

function cancelCustomShot() {
  S.customFormOpen = false;
  S.customSectionTarget = null;
  const w = document.getElementById('custom-form-wrap');
  if (w) w.innerHTML = `<button class="btn btn-ghost add-custom-btn" onclick="showCustomForm()">＋ Add Custom Shot</button>`;
}

/* ──────────────────────────────────────────
   SCREEN: ADVANCED SHOT BUILDER (spreadsheet-style)
────────────────────────────────────────── */
let _bldDrag = null; // { kind: 'shot', items: [{si, idx}] } | { kind: 'section', si }

function _bldKey(si, idx) { return si + ':' + idx; }
function _bldIsSelected(si, idx) { return S.builderSelected.includes(_bldKey(si, idx)); }
function _bldShotDefaults(typeVal) {
  const t = SHOT_TYPES[typeVal] || SHOT_TYPES['custom'];
  return {
    description: t.what,
    duration: '3-5s',
    tip: t.what,
    app: (typeVal === 'hyperlapse' || typeVal === 'timelapse') ? 'Mimo' : null,
    fps: typeVal === 'slow-mo' ? '60' : null,
  };
}
function _bldNewShot(typeVal = 'static', title = '') {
  return { id: generateId(), type: typeVal, title, ..._bldShotDefaults(typeVal), completed: false, custom: true };
}

function startBuilder() {
  S.builderSections = [{ name: 'Section 1', shots: [_bldNewShot('static', '')] }];
  S.builderName     = 'Custom-' + new Date().toISOString().slice(0,10);
  S.builderSelected = [];
  goTo('builder');
}

function renderBuilder() {
  const typeOpts = (sel) => Object.entries(SHOT_TYPES)
    .map(([k, v]) => `<option value="${k}"${k===sel?' selected':''}>${v.icon} ${v.label}</option>`).join('');

  const sectionsHtml = S.builderSections.map((sec, si) => {
    const shotsHtml = sec.shots.map((shot, idx) => {
      const sel = _bldIsSelected(si, idx) ? ' selected' : '';
      return `<div class="builder-row${sel}"
        data-si="${si}" data-idx="${idx}"
        draggable="true"
        ondragstart="builderRowDragStart(event,${si},${idx})"
        ondragover="builderRowDragOver(event,${si},${idx})"
        ondragleave="builderRowDragLeave(event)"
        ondrop="builderRowDrop(event,${si},${idx})"
        ondragend="builderDragEnd(event)"
        onclick="builderRowClick(event,${si},${idx})">
        <span class="builder-row-grip" title="Drag to move (Alt to duplicate)">⋮⋮</span>
        <select onchange="builderUpdateRow(${si},${idx},'type',this.value)">${typeOpts(shot.type)}</select>
        <input type="text" value="${esc(shot.title||'')}" placeholder="Shot title…" maxlength="60" autocomplete="off"
               oninput="builderUpdateRow(${si},${idx},'title',this.value)"
               onkeydown="builderRowKeydown(event,${si},${idx})">
        <button class="builder-row-del" title="Delete row"
                onclick="event.stopPropagation();builderDeleteShot(${si},${idx})">✕</button>
      </div>`;
    }).join('');

    const empty = sec.shots.length === 0
      ? `<div class="builder-row-empty">Empty section — drag rows here or click below to add.</div>`
      : '';

    return `<div class="builder-section" data-section-si="${si}"
      ondragover="builderSectionDragOver(event,${si})"
      ondrop="builderSectionDrop(event,${si})"
      ondragleave="builderSectionDragLeave(event)">
      <div class="builder-section-hdr"
           draggable="true"
           ondragstart="builderSectionDragStart(event,${si})"
           ondragend="builderDragEnd(event)">
        <span class="builder-section-grip" title="Drag section">⋮⋮</span>
        <input type="text" class="builder-section-name" value="${esc(sec.name)}"
               oninput="builderRenameSection(${si},this.value)" maxlength="40"
               onmousedown="event.stopPropagation()">
        <span class="builder-section-count">${sec.shots.length}</span>
        <button class="builder-section-del" title="Delete section"
                onclick="builderDeleteSection(${si})">🗑</button>
      </div>
      <div class="builder-section-body">
        ${empty}${shotsHtml}
        <button class="builder-add-row-btn" onclick="builderAddRow(${si})">＋ New row</button>
      </div>
    </div>`;
  }).join('');

  return `<div class="screen-title">Advanced Shot Builder</div>
  <p class="builder-intro">Spreadsheet-style: add rows, edit inline, drag to reorder. Build a custom shot list fast.</p>

  <div class="builder-tip-bar">
    <span><kbd>Click</kbd> select · <kbd>Shift</kbd>/<kbd>Ctrl</kbd>+click multi · <kbd>Drag</kbd> move · <kbd>Alt</kbd>+drag duplicate · <kbd>Ctrl</kbd>+<kbd>C</kbd>/<kbd>V</kbd>/<kbd>D</kbd> · <kbd>Del</kbd></span>
  </div>

  <div class="form-group">
    <label>Project Name</label>
    <input type="text" id="bld-proj-name" value="${esc(S.builderName)}" maxlength="60" autocomplete="off"
           oninput="S.builderName=this.value.trim()">
  </div>

  ${sectionsHtml}

  <button class="btn btn-ghost add-section-btn" onclick="builderAddSection()">＋ Add Section</button>

  <div class="builder-actions">
    <button class="btn btn-primary btn-large" onclick="builderSave()">💾 Save Project</button>
  </div>`;
}

/* ── Section operations ── */
function builderRenameSection(si, name) {
  if (S.builderSections[si]) S.builderSections[si].name = name;
}
function builderAddSection() {
  S.builderSections.push({ name: 'New Section', shots: [_bldNewShot('static', '')] });
  S.builderSelected = [];
  render();
}
function builderDeleteSection(si) {
  if (S.builderSections.length === 1) {
    showBanner('You need at least one section.', 'danger');
    return;
  }
  S.builderSections.splice(si, 1);
  S.builderSelected = [];
  render();
}

/* ── Row operations ── */
function builderAddRow(si, atIdx) {
  const shots = S.builderSections[si].shots;
  const idx = (atIdx == null) ? shots.length : Math.max(0, Math.min(atIdx, shots.length));
  shots.splice(idx, 0, _bldNewShot('static', ''));
  S.builderSelected = [];
  render();
  requestAnimationFrame(() => {
    const row = document.querySelector(`.builder-row[data-si="${si}"][data-idx="${idx}"]`);
    row?.querySelector('input[type=text]')?.focus();
  });
}
function builderUpdateRow(si, idx, field, value) {
  const shot = S.builderSections[si]?.shots[idx];
  if (!shot) return;
  shot[field] = value;
  if (field === 'type') Object.assign(shot, _bldShotDefaults(value));
}
function builderDeleteShot(si, idx) {
  S.builderSections[si].shots.splice(idx, 1);
  S.builderSelected = [];
  render();
}
function builderRowKeydown(e, si, idx) {
  if (e.key === 'Enter') {
    e.preventDefault();
    builderAddRow(si, idx + 1);
  }
}

/* ── Selection ── */
function builderRowClick(e, si, idx) {
  const k = _bldKey(si, idx);
  if (e.shiftKey && S.builderSelected.length) {
    const last = S.builderSelected[S.builderSelected.length - 1];
    const [lsi, lidx] = last.split(':').map(Number);
    if (lsi === si) {
      const lo = Math.min(lidx, idx), hi = Math.max(lidx, idx);
      const range = [];
      for (let i = lo; i <= hi; i++) range.push(_bldKey(si, i));
      S.builderSelected = range;
    } else {
      S.builderSelected = [k];
    }
  } else if (e.ctrlKey || e.metaKey) {
    S.builderSelected = S.builderSelected.includes(k)
      ? S.builderSelected.filter(x => x !== k)
      : [...S.builderSelected, k];
  } else {
    S.builderSelected = [k];
  }
  _bldUpdateSelectionVisuals();
}
function _bldUpdateSelectionVisuals() {
  document.querySelectorAll('.builder-row[data-si]').forEach(el => {
    const k = el.dataset.si + ':' + el.dataset.idx;
    el.classList.toggle('selected', S.builderSelected.includes(k));
  });
}

/* ── Clipboard / delete / duplicate ── */
function _bldGetSelectedShots() {
  return S.builderSelected
    .map(k => k.split(':').map(Number))
    .sort((a, b) => a[0] - b[0] || a[1] - b[1])
    .map(([si, idx]) => ({ si, idx, shot: S.builderSections[si]?.shots[idx] }))
    .filter(x => x.shot);
}
function builderCopySelection() {
  const picked = _bldGetSelectedShots();
  if (!picked.length) return;
  S.builderClipboard = picked.map(({ shot }) => JSON.parse(JSON.stringify(shot)));
  showBanner(`Copied ${picked.length} shot${picked.length>1?'s':''}.`, 'info', 1200);
}
function builderPasteClipboard() {
  if (!S.builderClipboard || !S.builderClipboard.length) return;
  let targetSi, targetIdx;
  if (S.builderSelected.length) {
    const last = S.builderSelected[S.builderSelected.length - 1];
    [targetSi, targetIdx] = last.split(':').map(Number);
    targetIdx += 1;
  } else {
    targetSi = S.builderSections.length - 1;
    targetIdx = S.builderSections[targetSi].shots.length;
  }
  const copies = S.builderClipboard.map(s => ({ ...JSON.parse(JSON.stringify(s)), id: generateId() }));
  S.builderSections[targetSi].shots.splice(targetIdx, 0, ...copies);
  S.builderSelected = copies.map((_, i) => _bldKey(targetSi, targetIdx + i));
  render();
  showBanner(`Pasted ${copies.length} shot${copies.length>1?'s':''}.`, 'info', 1200);
}
function builderDeleteSelection() {
  if (!S.builderSelected.length) return;
  const picked = _bldGetSelectedShots();
  const bySec = {};
  for (const { si, idx } of picked) (bySec[si] = bySec[si] || []).push(idx);
  for (const si of Object.keys(bySec)) {
    bySec[si].sort((a, b) => b - a).forEach(idx => S.builderSections[si].shots.splice(idx, 1));
  }
  S.builderSelected = [];
  render();
}
function builderDuplicateSelection() {
  if (!S.builderSelected.length) return;
  const picked = _bldGetSelectedShots();
  for (let i = picked.length - 1; i >= 0; i--) {
    const { si, idx, shot } = picked[i];
    const copy = { ...JSON.parse(JSON.stringify(shot)), id: generateId() };
    S.builderSections[si].shots.splice(idx + 1, 0, copy);
  }
  S.builderSelected = [];
  render();
}

/* ── Drag & drop: rows ── */
function builderRowDragStart(e, si, idx) {
  e.stopPropagation();
  const k = _bldKey(si, idx);
  let items;
  if (S.builderSelected.includes(k) && S.builderSelected.length > 1) {
    items = _bldGetSelectedShots().map(x => ({ si: x.si, idx: x.idx }));
  } else {
    items = [{ si, idx }];
    S.builderSelected = [k];
    _bldUpdateSelectionVisuals();
  }
  _bldDrag = { kind: 'shot', items };
  try { e.dataTransfer.setData('text/plain', 'row'); } catch {}
  e.dataTransfer.effectAllowed = 'copyMove';
  e.currentTarget.classList.add('dragging');
}
function builderRowDragOver(e, si, idx) {
  if (!_bldDrag || _bldDrag.kind !== 'shot') return;
  e.preventDefault();
  e.stopPropagation();
  e.dataTransfer.dropEffect = e.altKey ? 'copy' : 'move';
  const r = e.currentTarget.getBoundingClientRect();
  const before = (e.clientY - r.top) < r.height / 2;
  document.querySelectorAll('.builder-row.drag-over-before, .builder-row.drag-over-after')
    .forEach(el => el.classList.remove('drag-over-before','drag-over-after'));
  e.currentTarget.classList.add(before ? 'drag-over-before' : 'drag-over-after');
}
function builderRowDragLeave(e) {
  e.currentTarget.classList.remove('drag-over-before','drag-over-after');
}
function builderRowDrop(e, si, idx) {
  if (!_bldDrag || _bldDrag.kind !== 'shot') return;
  e.preventDefault();
  e.stopPropagation();
  const r = e.currentTarget.getBoundingClientRect();
  const before = (e.clientY - r.top) < r.height / 2;
  _bldPerformShotDrop(si, before ? idx : idx + 1, e.altKey);
}

/* ── Drag & drop: section body (catches drops in empty/below-rows area) ── */
function builderSectionDragOver(e, si) {
  if (!_bldDrag) return;
  if (_bldDrag.kind === 'shot') {
    if (e.target.closest('.builder-row[data-si]')) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = e.altKey ? 'copy' : 'move';
  } else if (_bldDrag.kind === 'section') {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.builder-section.section-drag-over')
      .forEach(el => el.classList.remove('section-drag-over'));
    e.currentTarget.classList.add('section-drag-over');
  }
}
function builderSectionDragLeave(e) {
  if (!e.relatedTarget || !e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('section-drag-over');
  }
}
function builderSectionDrop(e, si) {
  if (!_bldDrag) return;
  if (_bldDrag.kind === 'shot') {
    if (e.target.closest('.builder-row[data-si]')) return;
    e.preventDefault();
    _bldPerformShotDrop(si, S.builderSections[si].shots.length, e.altKey);
  } else if (_bldDrag.kind === 'section') {
    e.preventDefault();
    const fromSi = _bldDrag.si;
    if (fromSi === si) { _bldDrag = null; builderDragEnd(e); return; }
    const r = e.currentTarget.getBoundingClientRect();
    const before = (e.clientY - r.top) < r.height / 2;
    const targetIdx = before ? si : si + 1;
    const item = S.builderSections.splice(fromSi, 1)[0];
    const adj = fromSi < targetIdx ? targetIdx - 1 : targetIdx;
    S.builderSections.splice(adj, 0, item);
    _bldDrag = null;
    S.builderSelected = [];
    render();
  }
}

function _bldPerformShotDrop(targetSi, rawTargetIdx, isAlt) {
  if (!_bldDrag || _bldDrag.kind !== 'shot') return;
  const sorted = _bldDrag.items.slice().sort((a, b) => a.si - b.si || a.idx - b.idx);
  const shots  = sorted.map(({ si, idx }) => S.builderSections[si].shots[idx]).filter(Boolean);

  if (isAlt) {
    const copies = shots.map(s => ({ ...JSON.parse(JSON.stringify(s)), id: generateId() }));
    S.builderSections[targetSi].shots.splice(rawTargetIdx, 0, ...copies);
  } else {
    const removalsBefore = sorted.filter(it => it.si === targetSi && it.idx < rawTargetIdx).length;
    sorted.slice().sort((a, b) => b.si - a.si || b.idx - a.idx)
      .forEach(({ si, idx }) => S.builderSections[si].shots.splice(idx, 1));
    S.builderSections[targetSi].shots.splice(rawTargetIdx - removalsBefore, 0, ...shots);
  }

  _bldDrag = null;
  S.builderSelected = [];
  render();
}

/* ── Drag & drop: sections ── */
function builderSectionDragStart(e, si) {
  // Don't fire if user is dragging from inside the name input
  if (e.target.closest('.builder-section-name, .builder-section-del')) {
    e.preventDefault();
    return;
  }
  e.stopPropagation();
  _bldDrag = { kind: 'section', si };
  try { e.dataTransfer.setData('text/plain', 'section'); } catch {}
  e.dataTransfer.effectAllowed = 'move';
  const sec = e.currentTarget.closest('.builder-section');
  if (sec) sec.classList.add('dragging');
}

function builderDragEnd(_e) {
  document.querySelectorAll('.dragging, .drag-over-before, .drag-over-after, .section-drag-over')
    .forEach(el => el.classList.remove('dragging','drag-over-before','drag-over-after','section-drag-over'));
  _bldDrag = null;
}

/* ── Keyboard shortcuts (registered globally; only acts on builder screen) ── */
function builderHandleKeydown(e) {
  if (S.screen !== 'builder') return;
  const t = e.target;
  const inField = t && (t.tagName === 'INPUT' || t.tagName === 'SELECT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
  const meta = e.ctrlKey || e.metaKey;

  if (!inField && (e.key === 'Delete' || e.key === 'Backspace')) {
    if (S.builderSelected.length) { e.preventDefault(); builderDeleteSelection(); }
    return;
  }
  if (e.key === 'Escape' && S.builderSelected.length) {
    S.builderSelected = []; _bldUpdateSelectionVisuals();
    return;
  }
  if (meta && !inField) {
    const k = e.key.toLowerCase();
    if (k === 'c') { e.preventDefault(); builderCopySelection(); return; }
    if (k === 'v') { e.preventDefault(); builderPasteClipboard(); return; }
    if (k === 'd') { e.preventDefault(); builderDuplicateSelection(); return; }
    if (k === 'a') {
      e.preventDefault();
      const all = [];
      S.builderSections.forEach((sec, si) => sec.shots.forEach((_, idx) => all.push(_bldKey(si, idx))));
      S.builderSelected = all;
      _bldUpdateSelectionVisuals();
      return;
    }
  }
}

function builderSave() {
  const nameEl = document.getElementById('bld-proj-name');
  const name   = (nameEl?.value.trim() || S.builderName || 'Custom-' + new Date().toISOString().slice(0,10)).slice(0,60);

  const allShots = [];
  const sections = [];
  for (const sec of S.builderSections) {
    if (!sections.includes(sec.name)) sections.push(sec.name);
    for (const s of sec.shots) {
      if (!s.title || !s.title.trim()) continue;
      allShots.push({ ...s, section: sec.name });
    }
  }

  if (!allShots.length) { showBanner('Add at least one shot with a title before saving.', 'danger'); return; }

  const project = {
    id:        generateId(),
    name,
    createdAt: new Date().toISOString(),
    event:     '',
    topic:     name,
    duration:  0,
    skillLevel: 1,
    shots:     allShots,
    sections,
  };
  S.projects.unshift(project);
  S.project = project;
  saveProjects();
  goTo('checklist');
}

async function detectLensesAndFillProfile() {
  const btn = document.getElementById('detect-btn');
  if (btn) { btn.textContent = 'Detecting…'; btn.disabled = true; }
  await detectLenses();
  if (btn) { btn.textContent = 'Auto-detect'; btn.disabled = false; }
  if (S.lensProfile?.labels?.length) {
    const parts = [];
    if (S.lensProfile.ultrawide) parts.push('Ultrawide');
    if (S.lensProfile.telephoto) parts.push('Telephoto');
    if (S.lensProfile.cinematic) parts.push('Cinematic');
    const desc = parts.length ? parts.join(' + ') : (S.lensProfile.count + ' cameras');
    S.profile.camera = `Phone — ${desc}`;
    S.profile.lenses = S.lensProfile; // persist so future videos don't re-prompt
    saveProfile();
    const inp = document.getElementById('p-camera');
    if (inp) inp.value = S.profile.camera;
  } else {
    showBanner('Could not detect — enter your device manually.', 'warn', 3000);
  }
}

    if (S.lessonsRead.length >= 10) checkBadge('shot-scholar');
    const shotTypeIds = ['static','pan','tilt','tracking','slow-mo','hyperlapse','timelapse','zoom'];
    if (shotTypeIds.every(sid => S.lessonsRead.includes(sid))) checkBadge('shot-master');
  }
}

/* ──────────────────────────────────────────
   B-ROLL SCHOOL — BADGES
────────────────────────────────────────── */
function checkBadge(id, tier = null) {
  const RANK = { bronze:1, silver:2, gold:3, platinum:4 };
  const badge = BADGES.find(b => b.id === id);
  if (!badge) return;
  if (tier) {
    // Challenge tier badge — upgrade-only
    const current = S.badgeTiers[id] || null;
    if (current && RANK[current] >= RANK[tier]) return;
    S.badgeTiers[id] = tier;
  } else {
    // Non-tier badge — already earned check
    if (S.badges.includes(id)) return;
  }
  if (!S.badges.includes(id)) S.badges.push(id);
  saveBadges();
  if (tier) {
    const medals = { bronze:'🥉 Bronze', silver:'🥈 Silver', gold:'🥇 Gold', platinum:'🏆 Platinum' };
    const labels = { bronze:'Foundation complete', silver:'Level Up complete', gold:'Go Further complete', platinum:'All 20 shots complete' };
    showBanner(`${medals[tier]} badge: ${badge.name} — ${labels[tier]}!`, tier === 'platinum' ? 'gold' : tier, 5000);
  } else {
    showBanner(`🏅 Badge unlocked: ${badge.name}!`, 'success', 4000);
  }
}

function checkSeasonalBadge(id) {
  const badge = BADGES.find(b => b.id === id);
  if (!badge || S.badges.includes(id)) return;
  S.badges.push(id);
  saveBadges();
  showBanner(`✨ Special badge unlocked: ${badge.name}!`, 'info', 6000);
}

function badgeHtml(badge) {
  const tier = S.badgeTiers[badge.id] || null;
  const earned = S.badges.includes(badge.id);
  const cls = tier ? tier : (earned ? (badge.seasonal ? 'seasonal' : 'earned') : 'locked');
  const svgStr = badge.svg.replace('class="badge-svg"', `class="badge-svg ${cls}"`);
  const tierLabel = tier ? ` <span style="font-size:0.7em;opacity:0.7">${tier}</span>` : '';
  return `<div class="badge-item" title="${esc(badge.desc)}">
    ${svgStr}
    <span class="badge-name${earned ? ' earned-name' : ''}">${esc(badge.name)}${tierLabel}</span>
  </div>`;
}

function renderBadgeGrid() {
  const visible    = BADGES.filter(b => !b.seasonal || S.badges.includes(b.id));
  const earnedCount = S.badges.length;
  const total      = BADGES.filter(b => !b.seasonal).length;
  return `<div class="badge-section">
    <div class="section-label">Your Badges · ${earnedCount}/${total}</div>
    <div class="badge-grid">${visible.map(badgeHtml).join('')}</div>
  </div>`;
}

/* ──────────────────────────────────────────
   SCREEN: SCHOOL HUB
────────────────────────────────────────── */
function renderSchool() {
  const lessonCards = LESSONS.map(l => {
    const read = S.lessonsRead.includes(l.id);
    return `<div class="lesson-card${read ? ' read' : ''}" onclick="goToLesson('${l.id}')">
      <div class="lesson-icon">${l.icon}</div>
      <div class="lesson-title">${esc(l.title)}</div>
      <div class="lesson-subtitle">${esc(l.subtitle)}</div>
      ${l.gyro ? `<span class="gyro-badge">Practice</span>` : ''}
      ${read ? `<span class="read-check">✓</span>` : ''}
    </div>`;
  }).join('');

  const challengeCards = CHALLENGES.map((c, i) => {
    const badge = BADGES.find(b => b.id === c.meta.badgeId);
    const earned = S.badges.includes(c.meta.badgeId);
    const diffClass = c.meta.difficulty.toLowerCase();
    const badgeSvg = badge ? badge.svg.replace('class="badge-svg"', `class="badge-svg ${earned ? 'earned' : 'locked'}" style="width:28px;height:28px"`) : '';
    return `<div class="challenge-card">
      <div class="challenge-card-header">
        <div class="challenge-icon">${c.meta.icon}</div>
        <div>
          <div class="challenge-title">${esc(c.meta.title)}</div>
          <div class="challenge-tagline">${esc(c.meta.tagline)}</div>
          <div class="challenge-meta">
            <span class="skill-pill ${diffClass}">${c.meta.difficulty}</span>
            <span style="font-size:12px;color:var(--muted)">${c.meta.shotCount} shots</span>
            ${badge ? `<div class="badge-preview-wrap">${badgeSvg}<span>${earned ? '✓ Badge earned' : 'Earn: ' + badge.name}</span></div>` : ''}
          </div>
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="loadChallenge(${i})">
        ${earned ? '🔄 Redo Challenge' : '🎯 Accept Challenge'}
      </button>
    </div>`;
  }).join('');

  const starterCards = STARTER_PROJECTS.map((s, i) => {
    const diffClass = s.meta.skillLabel.toLowerCase();
    return `<div class="starter-card">
      <div class="starter-card-header">
        <div class="starter-icon">${s.meta.icon}</div>
        <div>
          <div class="starter-title">${esc(s.meta.title)}</div>
          <div class="starter-desc">${esc(s.meta.description)}</div>
          <div class="challenge-meta" style="margin-top:6px">
            <span class="skill-pill ${diffClass}">${s.meta.skillLabel}</span>
          </div>
        </div>
      </div>
      <button class="btn btn-ghost btn-full" onclick="loadStarterProject(${i})">📂 Load as Project</button>
    </div>`;
  }).join('');

  return `<div class="school-hero">
      <h2>🎬 B-Roll School</h2>
      <p>Learn the shots, practice the moves, and take on location challenges to earn badges.</p>
    </div>
    <div class="section-label">Lessons · ${S.lessonsRead.length}/${LESSONS.length} completed</div>
    <div class="lesson-grid">${lessonCards}</div>
    <div class="challenge-section">
      <div class="section-label">Challenges — Earn a Badge</div>
      ${challengeCards}
    </div>
    <div class="starter-section">
      <div class="section-label">Starter Projects — Practice Anywhere</div>
      ${starterCards}
    </div>
    ${renderBadgeGrid()}`;
}

/* ──────────────────────────────────────────
   SCREEN: LESSON
────────────────────────────────────────── */
function renderLessonBlocks(blocks) {
  return blocks.map((b, i) => {
    const d = `style="animation-delay:${i * 65}ms"`;
    if (b.kind === 'text')    return `<p class="lesson-text" ${d}>${esc(b.body)}</p>`;
    if (b.kind === 'tip')     return `<div class="tip-box" ${d}>💡 ${esc(b.body)}</div>`;
    if (b.kind === 'why')     return `<div class="why-box" ${d}><strong>Key insight:</strong> ${esc(b.body)}</div>`;
    if (b.kind === 'banner')  return `<div class="tip-banner" ${d}>${esc(b.body)}</div>`;
    if (b.kind === 'bullets') return `<ul class="lesson-bullets" ${d}>${b.items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>`;
    return '';
  }).join('');
}

function renderLesson() {
  const lesson = LESSONS.find(l => l.id === S.lessonId);
  if (!lesson) return `<p>Lesson not found.</p>`;
  const animHtml = lesson.shotType
    ? `<div class="lesson-anim-wrap">${renderShotAnimation({ type: lesson.shotType, fps: null, app: null })}</div>`
    : '';
  const read = S.lessonsRead.includes(lesson.id);
  return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <span style="font-size:36px;line-height:1">${lesson.icon}</span>
      <div>
        <div style="font-size:18px;font-weight:700">${esc(lesson.title)}</div>
        <div style="font-size:13px;color:var(--muted)">${esc(lesson.subtitle)}${read ? ' · <span style="color:var(--success)">✓ Completed</span>' : ''}</div>
      </div>
    </div>
    ${animHtml}
    <div class="lesson-blocks">${renderLessonBlocks(lesson.blocks)}</div>`;
}

/* ──────────────────────────────────────────
   LOAD STARTER / CHALLENGE
────────────────────────────────────────── */
function loadStarterProject(idx) {
  const starter = STARTER_PROJECTS[idx];
  if (!starter) return;
  const p = JSON.parse(JSON.stringify(starter.project));
  const existing = S.projects.findIndex(x => x.id === p.id);
  if (existing >= 0) S.projects[existing] = p; else S.projects.unshift(p);
  S.project = p;
  S.form.eventName = p.event ? (p.location ? `${p.event}, ${p.location}` : p.event) : '';
  S.form.topic = p.topic || '';
  S.form.duration = p.duration || 60;
  saveProjects();
  S.prevScreen = 'school';
  goTo('checklist');
}

function loadChallenge(idx) {
  const challenge = CHALLENGES[idx];
  if (!challenge) return;
  const p = JSON.parse(JSON.stringify(challenge.project));
  const existing = S.projects.findIndex(x => x.id === p.id);
  if (existing >= 0) S.projects[existing] = p; else S.projects.unshift(p);
  S.project = p;
  S.form.eventName = p.event ? (p.location ? `${p.event}, ${p.location}` : p.event) : '';
  S.form.topic = p.topic || '';
  S.form.duration = p.duration || 60;
  saveProjects();
  S.prevScreen = 'school';
  goTo('checklist');
  showBanner('🎯 Challenge started! Complete all shots to earn the ' + (BADGES.find(b=>b.id===challenge.meta.badgeId)?.name||'badge') + ' badge.', 'info', 5000);
}

/* ──────────────────────────────────────────
   INIT
────────────────────────────────────────── */
(function init() {
  loadProjects();
  loadBadges();
  loadLessonsRead();
  loadProfile();
  document.addEventListener('keydown', builderHandleKeydown);
  S.screen = profileIsSet() ? 'home' : 'profile';
  render();
})();
</script>
</body>
</html>
